<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The IN — Snackautomat-Verwaltung</title>
<!-- PWA / installierbar -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The IN">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f0d;
  --bg2:#141714;
  --panel:#1a1e1a;
  --panel2:#212621;
  --line:#2c322c;
  --line2:#3a423a;
  --txt:#e8ece8;
  --txt2:#9aa49a;
  --txt3:#6c766c;
  --acc:#4ade5e;        /* vending green */
  --acc-dim:#2f8f3e;
  --warn:#ff7a5c;
  --warn-bg:#2a1a16;
  --ok:#4ade5e;
  --blue:#5b9dff;
  --radius:14px;
  --radius-sm:9px;
  --mono:'IBM Plex Mono',ui-monospace,monospace;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
  --disp:'Sora',system-ui,sans-serif;
}
[data-theme="light"]{
  --bg:#f4f6f4;--bg2:#eceeec;--panel:#ffffff;--panel2:#f6f8f6;
  --line:#e2e6e2;--line2:#d2d8d2;--txt:#13160f;--txt2:#5a635a;--txt3:#8b948b;
  --acc:#1f9d3a;--acc-dim:#1f9d3a;--warn:#d8401c;--warn-bg:#fbe9e4;--ok:#1f9d3a;--blue:#2f6fe0;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;overflow-x:clip}
body{
  font-family:var(--sans);background:var(--bg);color:var(--txt);
  font-size:15px;line-height:1.45;min-height:100vh;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  background-image:radial-gradient(circle at 18% -10%,rgba(74,222,94,.07),transparent 45%),radial-gradient(circle at 100% 0%,rgba(91,157,255,.05),transparent 40%);
  background-attachment:fixed;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px}
.mono{font-family:var(--mono)}
.app{display:flex;min-height:100vh}

/* ---------- Sidebar (desktop) ---------- */
.sidebar{
  width:236px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:11px;padding:20px 18px 18px}
.brand-logo{width:38px;height:38px;flex-shrink:0}
.brand-txt b{font-family:var(--disp);font-weight:800;font-size:18px;letter-spacing:-.5px;display:block;line-height:1}
.brand-txt span{font-size:11px;color:var(--txt2);letter-spacing:1.5px;text-transform:uppercase}
.nav{padding:6px 12px;display:flex;flex-direction:column;gap:3px;flex:1}
.nav button{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:var(--radius-sm);color:var(--txt2);font-weight:500;font-size:14.5px;text-align:left;transition:.13s}
.nav button:hover{background:var(--panel);color:var(--txt)}
.nav button.active{background:var(--panel);color:var(--txt);box-shadow:inset 3px 0 0 var(--acc)}
.nav button svg{width:19px;height:19px;flex-shrink:0;opacity:.85}
.nav button.active svg{color:var(--acc);opacity:1}
.sidebar-foot{padding:14px 18px;border-top:1px solid var(--line);font-size:11.5px;color:var(--txt3);font-family:var(--mono)}

/* ---------- Main ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:none}
.content{padding:26px 30px 60px;max-width:1180px;width:100%;margin:0 auto;flex:1;min-width:0;overflow-x:hidden}
.content.wide{max-width:1600px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-head h1{font-family:var(--disp);font-weight:700;font-size:27px;letter-spacing:-.7px;margin:0}
.page-head .sub{color:var(--txt2);font-size:13.5px;margin-top:3px;font-family:var(--mono)}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:var(--radius-sm);font-weight:600;font-size:14px;transition:.13s;border:1px solid transparent;white-space:nowrap}
.btn svg{width:17px;height:17px}
.btn-acc{background:var(--acc);color:#06120a}
.btn-acc:hover{filter:brightness(1.08)}
.btn-ghost{background:var(--panel);color:var(--txt);border-color:var(--line2)}
.btn-ghost:hover{background:var(--panel2);border-color:var(--acc-dim)}
.btn-danger{background:var(--warn-bg);color:var(--warn);border-color:transparent}
.btn-danger:hover{filter:brightness(1.1)}
.btn:active{transform:translateY(1px)}
.btn-sm{padding:7px 12px;font-size:13px}

/* ---------- Toolbar ---------- */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.search{flex:1;min-width:200px;position:relative}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--txt3)}
.search input{width:100%;padding:11px 14px 11px 40px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--txt);outline:none;transition:.13s}
.search input:focus{border-color:var(--acc-dim);box-shadow:0 0 0 3px rgba(74,222,94,.1)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:8px 13px;background:var(--panel);border:1px solid var(--line);border-radius:99px;font-size:13px;color:var(--txt2);font-weight:500;transition:.13s}
.chip:hover{border-color:var(--line2)}
.chip.on{background:rgba(74,222,94,.13);border-color:var(--acc-dim);color:var(--acc)}
.selstyle{padding:9px 12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--txt);outline:none}

/* View toggle + sort bar */
.viewtog{display:flex;gap:2px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm);padding:3px}
.vbtn{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--txt2);font-size:15px;font-weight:700}
.vbtn svg{width:18px;height:18px}
.vbtn:hover{color:var(--txt);background:var(--panel2)}
.vbtn.on{background:rgba(74,222,94,.14);color:var(--acc)}
.sortbar{display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;margin-bottom:18px}
.sortgrp{display:flex;flex-direction:column;gap:5px;min-width:0}
.sortlbl{font-size:10.5px;color:var(--txt3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px}
.sortpick{display:flex;gap:6px}
.sortpick .selstyle{padding:8px 10px;font-size:13.5px}
.sortgrp>.selstyle{padding:8px 10px;font-size:13.5px}
.sortchips{margin-left:auto;align-self:center;padding-bottom:2px}

/* List view */
.plist{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--panel)}
.prow{display:flex;align-items:center;gap:12px;padding:11px 15px;border-bottom:1px solid var(--line);cursor:pointer;transition:.1s}
.prow:last-child{border-bottom:none}
.prow:hover{background:var(--panel2)}
.prow-main{flex:1;min-width:0}
.prow-name{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prow-sub{font-size:12px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.prow-db{font-family:var(--mono);font-size:12.5px;color:var(--txt2);white-space:nowrap}
.prow-price{font-family:var(--mono);font-weight:600;font-size:16px;white-space:nowrap;min-width:74px;text-align:right}

/* ---------- Product grid ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;transition:.14s;cursor:pointer;position:relative;overflow:hidden}
.quickacts{position:absolute;top:10px;right:10px;display:flex;gap:6px;opacity:0;transition:.13s;z-index:2}
.card:hover .quickacts{opacity:1}
.qa-btn{width:30px;height:30px;border-radius:8px;background:var(--panel2);border:1px solid var(--line2);color:var(--txt2);display:flex;align-items:center;justify-content:center;transition:.12s}
.qa-btn svg{width:15px;height:15px}
.qa-btn:hover{background:var(--line);color:var(--txt)}
.qa-del:hover{background:var(--warn-bg);color:var(--warn);border-color:var(--warn)}
.is-dupe{border-color:var(--warn)!important;box-shadow:inset 3px 0 0 var(--warn)}
.dupe-tag{font-size:10.5px;font-weight:600;color:var(--warn);background:var(--warn-bg);padding:1px 7px;border-radius:99px;margin-left:5px}
.prow-acts{display:flex;gap:6px;flex-shrink:0;opacity:0;transition:.13s;margin-left:4px}
.prow:hover .prow-acts{opacity:1}
@media(max-width:860px){ .quickacts{opacity:1} .prow-acts{opacity:1} }
.card:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.card-name{font-weight:600;font-size:15px;line-height:1.25;margin:0}
.card-kat{font-size:12px;color:var(--txt3);margin-top:2px}
.card-price{font-family:var(--mono);font-weight:600;font-size:25px;letter-spacing:-1px;margin:13px 0 4px;display:flex;align-items:baseline;gap:6px}
.card-price .eur{font-size:15px;color:var(--txt2);font-weight:400}
.card-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px}
.tag{font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:99px;display:inline-flex;align-items:center;gap:5px}
.tag-ok{background:rgba(74,222,94,.12);color:var(--ok)}
.tag-warn{background:var(--warn-bg);color:var(--warn)}
.tag-mut{background:var(--panel2);color:var(--txt3)}
.tag-action{background:rgba(91,157,255,.13);color:var(--blue)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-on{background:var(--acc);box-shadow:0 0 7px var(--acc)}
.dot-off{background:var(--txt3)}
.dot-soon{background:#ffb44d;box-shadow:0 0 7px #ffb44d}
.dot-exp{background:var(--warn);box-shadow:0 0 7px var(--warn)}
.card-meta{font-size:12px;color:var(--txt3);font-family:var(--mono);margin-top:7px;display:flex;gap:14px}
.mhd-soon{color:var(--warn)!important}
.mhd-toggle{display:flex;align-items:center;gap:7px;margin-top:8px;font-size:12.5px;color:var(--txt2);cursor:pointer;font-weight:400}
.mhd-toggle input{width:16px;height:16px;accent-color:var(--acc);flex-shrink:0}
.pricelog p{margin:3px 0;font-size:12.5px;font-family:var(--mono)}
.whatsnew-btn{position:relative;flex-shrink:0}
.wn-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 2px var(--panel)}
.cl-rel{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.cl-rel:last-of-type{border-bottom:none}
.cl-rel-head{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.cl-date{font-weight:600;font-size:14px}
.cl-badge{font-size:11px;font-weight:600;color:var(--acc);background:rgba(74,222,94,.14);padding:2px 9px;border-radius:99px}
.cl-list{margin:0;padding-left:20px;display:flex;flex-direction:column;gap:5px}
.cl-list li{font-size:13.5px;color:var(--txt2);line-height:1.45}

/* ---------- Empty ---------- */
.empty{text-align:center;padding:70px 20px;color:var(--txt3)}
.empty svg{width:48px;height:48px;opacity:.4;margin-bottom:14px}

/* ---------- FAB ---------- */
.fab-wrap{position:fixed;right:22px;bottom:22px;display:flex;flex-direction:column;gap:11px;z-index:40}
.fab{width:54px;height:54px;border-radius:50%;background:var(--acc);color:#06120a;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 22px rgba(74,222,94,.35);transition:.14s}
.fab:hover{transform:scale(1.06)}
.fab svg{width:25px;height:25px}
.fab.scan{background:var(--panel);color:var(--txt);border:1px solid var(--line2);box-shadow:0 6px 18px rgba(0,0,0,.3)}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(4px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:18px;width:100%;max-width:560px;margin:auto;box-shadow:0 24px 70px rgba(0,0,0,.5);animation:pop .18s ease}
@keyframes pop{from{transform:translateY(14px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);border-radius:18px 18px 0 0;z-index:2}
.modal-head h2{font-family:var(--disp);font-size:19px;font-weight:700;margin:0}
.x{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--txt2);background:var(--panel2)}
.x:hover{color:var(--txt);background:var(--line)}
.x svg{width:18px;height:18px}
.modal-body{padding:20px 22px}

/* ---------- Form ---------- */
.fieldset{margin-bottom:20px}
.fieldset>legend{font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:var(--acc);font-weight:700;margin-bottom:11px;font-family:var(--mono);padding:0}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:12.5px;color:var(--txt2);font-weight:500}
.field input,.field select,.field textarea{padding:10px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--txt);outline:none;transition:.12s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--acc-dim);box-shadow:0 0 0 3px rgba(74,222,94,.1)}
/* Datumsfelder (z.B. MHD) brauchen keine volle Breite — kompakt wirkt aufgeräumter. */
.field input[type="date"]{max-width:220px;min-height:41px}
.field .hint{font-size:11px;color:var(--txt3)}
.field .req{font-size:11px;color:var(--warn);font-weight:600}
.geb-hint{font-size:13px;color:var(--txt2);font-family:var(--mono);background:rgba(74,222,94,.08);border:1px solid var(--acc-dim);border-radius:var(--radius-sm);padding:9px 12px}
.geb-hint b{color:var(--acc)}
/* Ablauf-Überwachung */
.explist{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.exprow{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius-sm)}
.exprow-main{flex:1;min-width:0}
.exprow-name{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exprow-sub{font-size:12px;color:var(--txt3);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.exprow-acts{display:flex;gap:6px;flex-shrink:0}
.mhdb{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.mhdb-exp{background:var(--warn-bg);color:var(--warn)}
.mhdb-soon{background:rgba(255,170,60,.15);color:#ffb44d}
.mhdb-act{background:rgba(91,157,255,.13);color:var(--blue)}
.mhdb-priv{background:rgba(74,222,94,.12);color:var(--ok)}
@media(max-width:860px){
  .exprow{flex-wrap:wrap}
  .exprow-acts{width:100%}
  .exprow-acts .btn{flex:1;justify-content:center}
}
.katchips{display:flex;flex-wrap:wrap;gap:6px}
.katcombo{display:flex;gap:7px}
.katcombo input{flex:1;min-width:0}
.katcaret{width:44px;flex-shrink:0;background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--txt2);display:flex;align-items:center;justify-content:center;transition:.12s}
.katcaret svg{width:18px;height:18px;transition:transform .15s}
.katcaret:hover{border-color:var(--acc-dim);color:var(--acc)}
.katcombo.open .katcaret svg{transform:rotate(180deg)}
.katpanel{display:none;margin-top:8px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--bg2);padding:11px}
.katpanel.open{display:block}
.katchip{padding:5px 11px;background:var(--panel2);border:1px solid var(--line);border-radius:99px;font-size:12.5px;color:var(--txt2);transition:.1s}
.katchip:hover{border-color:var(--acc-dim);color:var(--acc)}
.grundchips{display:flex;flex-wrap:wrap;gap:7px}
.grundchip{padding:8px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:99px;font-size:13px;font-weight:500;color:var(--txt2);transition:.12s}
.grundchip:hover{border-color:var(--line2);color:var(--txt)}
.grundchip.on{background:rgba(74,222,94,.14);border-color:var(--acc-dim);color:var(--acc);font-weight:600}
.mhdc-note{display:flex;gap:11px;align-items:flex-start;padding:13px 14px;background:var(--warn-bg);border:1px solid var(--warn);border-radius:var(--radius-sm);font-size:13.5px;line-height:1.5;color:var(--txt)}
.mhdc-note>svg{width:20px;height:20px;flex-shrink:0;color:var(--warn);margin-top:1px}
.mhdc-preview{margin-top:14px;padding:12px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius-sm)}
.mhdc-prev-row{display:flex;justify-content:space-between;align-items:center;gap:12px;font-size:13.5px;color:var(--txt2)}
.mhdc-prev-row b{color:var(--txt);font-family:var(--mono);font-size:13px;white-space:nowrap}
.inline-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius-sm)}
.switch{position:relative;width:42px;height:24px;flex-shrink:0}
.switch input{display:none}
.slider{position:absolute;inset:0;background:var(--line2);border-radius:99px;transition:.18s}
.slider:before{content:"";position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.18s}
.switch input:checked+.slider{background:var(--acc)}
.switch input:checked+.slider:before{transform:translateX(18px)}

/* ---------- Calc panel ---------- */
.calc{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin-bottom:20px}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px 18px}
.calc-row{display:flex;justify-content:space-between;align-items:baseline;font-size:13px}
.calc-row span{color:var(--txt2)}
.calc-row b{font-family:var(--mono);font-weight:600;font-size:14px}
.calc-hero{grid-column:1/-1;border-top:1px solid var(--line);margin-top:5px;padding-top:11px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.calc-hero .lbl{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);font-family:var(--mono);min-width:0}
.calc-hero .val{font-family:var(--mono);font-weight:600;font-size:30px;letter-spacing:-1px;color:var(--acc);white-space:nowrap;flex-shrink:0}
.pos{color:var(--ok)}.neg{color:var(--warn)}
.kpi-help{margin:-8px 0 20px;font-size:13px}
.kpi-help summary{cursor:pointer;color:var(--txt2);font-family:var(--mono);font-size:12px;padding:6px 0;list-style:none;user-select:none}
.kpi-help summary::-webkit-details-marker{display:none}
.kpi-help summary:before{content:"▸ ";color:var(--acc)}
.kpi-help[open] summary:before{content:"▾ "}
.kpi-help summary:hover{color:var(--txt)}
.kpi-help-body{padding:6px 2px 2px;color:var(--txt2);line-height:1.5}
.kpi-help-body p{margin:0 0 7px}
.kpi-help-body b{color:var(--txt)}
.qa-info{font-size:12.5px;color:var(--txt2);font-family:var(--mono);background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:9px 12px;margin-bottom:14px}
.vend-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.vend-stat{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 8px;text-align:center}
.vend-stat b{display:block;font-family:var(--mono);font-size:22px;font-weight:600}
.vend-stat span{font-size:11px;color:var(--txt3)}
.vend-stat.warn b{color:var(--warn)} .vend-stat.blue b{color:var(--blue)}
.vend-list{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--radius-sm);overflow-y:auto;max-height:240px}
.vend-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line)}
.vend-row:last-child{border-bottom:none}
.vend-name{flex:1;min-width:0;font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vend-sub{display:block;font-size:11px;color:var(--txt3);font-weight:400}
.vend-cmp{font-family:var(--mono);font-size:12px;color:var(--txt2);white-space:nowrap}
.vend-score{display:inline-block;background:rgba(91,157,255,.15);color:var(--blue);border-radius:99px;padding:0 6px;font-size:10.5px;font-weight:600;margin-left:4px}
.vend-acts2{display:flex;gap:6px;flex-shrink:0}

/* ---------- Table (Warenverderb) ---------- */
.tablewrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius);background:var(--panel)}
table{border-collapse:collapse;width:100%;font-size:13px;table-layout:auto}
th{text-align:left;padding:10px 10px;background:var(--bg2);color:var(--txt2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line);white-space:nowrap}
th.thwrap{white-space:normal}
td{padding:10px 10px;border-bottom:1px solid var(--line);vertical-align:top}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--panel2)}
.num{font-family:var(--mono);text-align:right;white-space:nowrap}
.tdel{color:var(--txt3)}
.tdel:hover{color:var(--warn)}
/* Lange Textspalten umbrechen lassen -> kein erzwungenes horizontales Scrollen */
.tablewrap td.wrap{white-space:normal;word-break:break-word;min-width:120px}
.tablewrap col.c-name{width:22%} .tablewrap col.c-kom{width:18%}
/* Jahr-Gruppen (Accordion) im Warenverderb */
.yeargroup{border:1px solid var(--line);border-radius:var(--radius);background:var(--panel);margin-bottom:12px;overflow:hidden}
.yearhead{display:flex;align-items:center;gap:11px;width:100%;padding:14px 16px;background:var(--bg2);color:var(--txt);font-size:15px;font-weight:600;text-align:left;transition:.12s}
.yearhead:hover{background:var(--panel2)}
.ycaret{width:17px;height:17px;flex-shrink:0;transition:transform .15s;color:var(--txt2)}
.yeargroup.open .ycaret{transform:rotate(90deg)}
.ytitle{flex-shrink:0}
.ymeta{margin-left:auto;font-size:12px;font-weight:400;color:var(--txt3);font-family:var(--mono);white-space:nowrap}
.yearbody{padding:16px}
.verderb-search{position:relative;display:flex;align-items:center;margin-bottom:14px}
.verderb-search>svg{position:absolute;left:13px;width:18px;height:18px;color:var(--txt3);pointer-events:none}
.verderb-search input{width:100%;padding:11px 40px 11px 40px;background:var(--panel);border:1px solid var(--line);border-radius:11px;color:var(--txt);font-size:14px}
.verderb-search input:focus{border-color:var(--acc);outline:none}
.vs-clear{position:absolute;right:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--txt3);border-radius:7px}
.vs-clear:hover{color:var(--txt);background:var(--panel2)}
.vs-clear svg{width:16px;height:16px}
.katmanage{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden}
.katmanage-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line)}
.katmanage-row:last-child{border-bottom:none}
.katmanage-name{flex:1;font-size:13.5px;font-weight:500}
.katmanage-cnt{font-family:var(--mono);font-size:12px;color:var(--txt3)}
.kat-add{display:flex;gap:9px;margin-bottom:12px}
.kat-add input{flex:1;min-width:0;padding:10px 12px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;color:var(--txt)}
.kat-add .btn{flex-shrink:0}
.bulkkat-chips{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 4px;max-height:42vh;overflow-y:auto}
.modal-btnrow{display:flex;gap:10px;margin-top:18px}
.modal-btnrow .btn{flex:1;justify-content:center}
/* ---------- Multi-Select ---------- */
.selbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin-bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-sm)}
.selall{display:flex;align-items:center;gap:9px;font-size:13.5px;cursor:pointer;color:var(--txt2)}
.selall input{width:17px;height:17px;accent-color:var(--acc)}
.selcount{font-size:13px;color:var(--txt3);font-family:var(--mono)}
.sel-card,.sel-row{position:relative;cursor:pointer}
.sel-card .sel-check,.sel-row .sel-check{flex-shrink:0;width:24px;height:24px;border-radius:7px;border:2px solid var(--line2);display:flex;align-items:center;justify-content:center;color:#08130a;transition:.1s}
.sel-card .sel-check{position:absolute;top:12px;right:12px;background:var(--bg2)}
.sel-row{display:flex;align-items:center;gap:12px}
.sel-row .sel-check{background:var(--bg2)}
.sel-on{border-color:var(--acc)!important;box-shadow:inset 0 0 0 1px var(--acc)}
.sel-on .sel-check{background:var(--acc);border-color:var(--acc)}
.sel-check svg{width:15px;height:15px}
.bulkbar{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--line2);border-radius:14px;box-shadow:0 12px 36px rgba(0,0,0,.5);padding:11px 14px;display:flex;align-items:center;gap:14px;z-index:40;max-width:94vw;flex-wrap:wrap;justify-content:center}
.bulk-count{font-size:13px;font-weight:600;color:var(--acc);font-family:var(--mono);white-space:nowrap}
.bulk-actions{display:flex;gap:7px;flex-wrap:wrap}
/* ---------- Dashboard ---------- */
.dashgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px;min-width:0}
.dashkpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;transition:.12s;min-width:0;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.dashkpi[style*=cursor]:hover{border-color:var(--line2);transform:translateY(-1px)}
.dashkpi-val{font-family:var(--mono);font-size:26px;font-weight:700;line-height:1.1;letter-spacing:-.5px;font-variant-numeric:tabular-nums;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dashkpi-lbl{font-size:12px;color:var(--txt3);margin-top:4px}
.dashkpi.ok .dashkpi-val{color:var(--acc)}
.dashkpi.warn .dashkpi-val{color:#ffb44d}
.dashkpi.bad .dashkpi-val{color:var(--warn)}
.dashnote{border-radius:var(--radius-sm);padding:11px 14px;font-size:13.5px;margin-bottom:16px}
.dashnote.bad{background:var(--warn-bg);border:1px solid var(--warn);color:var(--warn)}
.dashnote.info{background:rgba(91,157,255,.1);border:1px solid var(--blue);color:var(--blue)}
.dashnote.info:hover{background:rgba(91,157,255,.16)}
.dashcols{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:820px){.dashcols{grid-template-columns:1fr}}
/* min-width:0 ist Pflicht: Grid-Items haben sonst min-width:auto und werden von
   nowrap-Inhalten (lange Produktnamen) breiter als der Bildschirm gedrückt. */
.dashcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;min-width:0;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.dashcard h3{margin:0 0 12px;font-size:15px;letter-spacing:-.2px}
.dashcard-sub{font-size:12px;color:var(--txt3);font-weight:400;margin-left:6px}
.dashlist{display:flex;flex-direction:column;gap:2px;min-width:0}
.dashrow{display:flex;align-items:center;gap:12px;padding:10px 9px;border-radius:var(--radius-sm);cursor:pointer;transition:background .12s;min-width:0}
.dashrow:hover,.dashrow:active{background:var(--panel2)}
.dashrow-main{flex:1 1 auto;min-width:0}
.dashrow-name{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dashrow-sub{font-size:11.5px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.dashrow-sub .subwarn{color:var(--warn);font-weight:600}
/* Rechtes Accessory (Marge) — fixe Breite, Name links bekommt den Rest + Ellipsis. */
.dashrow-acc{flex:0 0 auto;display:flex;flex-direction:column;align-items:flex-end;line-height:1.25}
.dashrow-marge{font-family:var(--mono);font-weight:600;font-size:14px;white-space:nowrap;font-variant-numeric:tabular-nums}
.dashrow-acc.ok .dashrow-marge{color:var(--txt2)}
.dashrow-acc.warn .dashrow-marge{color:#ffb44d}
.dashrow-acc.bad .dashrow-marge{color:var(--warn)}
.dashrow-margelbl{font-size:9.5px;color:var(--txt3);text-transform:uppercase;letter-spacing:.7px;font-family:var(--mono)}
.dashbars{display:flex;flex-direction:column;gap:11px;min-width:0}
.dashbar-top{display:flex;justify-content:space-between;gap:8px;font-size:13px;margin-bottom:4px}
.dashbar-top span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.dashbar-cnt{font-family:var(--mono);color:var(--txt2);flex-shrink:0}
.dashbar-track{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden}
.dashbar-fill{height:100%;background:var(--acc);border-radius:99px;transition:width .3s}
/* Summenzeile unter den Verderb-Balken — bricht nie um, Werte rechtsbündig gestapelt. */
.dashsum{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.dashsum-lbl{font-size:12.5px;color:var(--txt2);white-space:nowrap}
.dashsum-vals{display:flex;flex-direction:column;align-items:flex-end;gap:1px;min-width:0}
.dashsum-vals b{font-family:var(--mono);font-size:15px;font-weight:600;white-space:nowrap}
.dashsum-vals span{font-size:11.5px;color:var(--txt3);font-family:var(--mono);white-space:nowrap}
/* EAN-Feld mit Scan-/Lookup-Buttons */
.ean-row{display:flex;gap:7px}
.ean-row input{flex:1}
.ean-btn{flex-shrink:0;width:44px;border-radius:9px;background:var(--bg2);border:1px solid var(--line);color:var(--txt2);display:flex;align-items:center;justify-content:center;transition:.12s}
.ean-btn svg{width:19px;height:19px}
.ean-btn:hover{background:var(--line);color:var(--acc);border-color:var(--acc-dim)}
.ean-btn.disabled{opacity:.4;pointer-events:none}

/* ---------- Scanner ---------- */
#reader{width:100%;border-radius:var(--radius);overflow:hidden;margin-bottom:14px;min-height:60px}
#reader video{border-radius:var(--radius)}
.scan-status{font-size:13px;color:var(--txt2);text-align:center;margin-bottom:12px;font-family:var(--mono)}

/* ---------- Settings ---------- */
.setcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;max-width:560px}
.setcard h3{font-family:var(--disp);font-size:16px;margin:0 0 4px}
.setcard p.d{color:var(--txt2);font-size:13px;margin:0 0 16px}

/* ---------- Toast ---------- */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel2);border:1px solid var(--line2);color:var(--txt);padding:12px 20px;border-radius:99px;font-size:14px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;transition:.22s;z-index:200;display:flex;align-items:center;gap:9px;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:17px;height:17px;color:var(--acc)}
.toast.undo{pointer-events:auto;padding-right:8px}
.toast-undo{background:var(--acc);color:#08130a;border:none;border-radius:99px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
.toast-undo:hover{filter:brightness(1.08)}

/* ---------- Login ---------- */
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:none;align-items:center;justify-content:center;padding:24px;
  background-image:radial-gradient(circle at 18% -10%,rgba(74,222,94,.07),transparent 45%),radial-gradient(circle at 100% 0%,rgba(91,157,255,.05),transparent 40%);}
.login-card{background:var(--panel);border:1px solid var(--line2);border-radius:18px;width:100%;max-width:380px;padding:28px 26px;box-shadow:0 24px 70px rgba(0,0,0,.5)}
.login-card .lg-brand{display:flex;align-items:center;gap:11px}
.login-card .lg-brand .brand-logo{width:34px;height:34px}
.login-card .lg-brand b{font-family:var(--disp);font-weight:800;font-size:19px;letter-spacing:-.5px}
.login-card h2{font-family:var(--disp);font-size:18px;margin:16px 0 4px}
.login-card p{color:var(--txt2);font-size:13px;margin:0 0 18px}
.login-card label{font-size:12.5px;color:var(--txt2);font-weight:500;display:block;margin-bottom:5px}
.login-card input{width:100%;padding:11px 13px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius-sm);color:var(--txt);outline:none;margin-bottom:13px;transition:.12s}
.login-card input:focus{border-color:var(--acc-dim);box-shadow:0 0 0 3px rgba(74,222,94,.1)}
.login-card .lg-err{color:var(--warn);font-size:12.5px;min-height:17px;margin-bottom:8px}
.login-card .btn{width:100%;justify-content:center}

/* ---------- Mobile ---------- */
.botnav{display:none}
@media(max-width:860px){
  .sidebar{display:none}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--bg2);background:color-mix(in srgb,var(--bg2) 86%,transparent);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .topbar .brand{padding:0}
  .topbar .brand-logo{width:32px;height:32px}
  .topbar .brand-txt b{font-size:16px}
  .content{padding:18px 16px 110px}
  .page-head h1{font-size:23px}
  .grid{grid-template-columns:1fr}
  .fgrid{grid-template-columns:1fr}
  .calc-grid{grid-template-columns:1fr}
  .fab-wrap{bottom:calc(84px + env(safe-area-inset-bottom,0px))}
  .prow-db{display:none}
  /* Dashboard kompakt: feste 2 Spalten, kleinere Werte -> nichts läuft über. */
  .dashgrid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .dashkpi{padding:14px 15px}
  .dashkpi-val{font-size:22px}
  .dashcard{padding:15px 14px}
  .calc-hero .val{font-size:26px}
  .vend-stats{grid-template-columns:repeat(2,1fr)}
  .toast{bottom:calc(80px + env(safe-area-inset-bottom,12px));max-width:92vw}
  .sortbar{gap:11px}
  .sortgrp{width:100%}
  .sortpick{width:100%}
  .sortpick .selstyle{flex:1;min-width:0}
  .sortgrp>.selstyle{width:100%}
  .sortchips{margin-left:0;width:100%;align-self:stretch}
  /* Bottom-Nav bleibt position:fixed;bottom:0 (bewährt). Milchglas + Safe-Area wie bei iOS-Tab-Bars. */
  .botnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg2);background:color-mix(in srgb,var(--bg2) 84%,transparent);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);border-top:1px solid var(--line);z-index:35;padding:8px 4px calc(8px + env(safe-area-inset-bottom,12px))}
  .botnav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--txt3);font-size:10.5px;font-weight:600;min-width:0;transition:color .12s,transform .1s}
  .botnav button span{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .botnav button svg{width:22px;height:22px}
  .botnav button.active{color:var(--acc)}
  .botnav button:active{transform:scale(.94)}
  .overlay{padding:0;align-items:flex-end}
  .modal{max-width:none;border-radius:18px 18px 0 0;max-height:94vh;overflow-y:auto;margin:0;-webkit-overflow-scrolling:touch}
  .modal-head{border-radius:18px 18px 0 0;padding-top:26px}
  /* Grabber-Griff oben am Sheet — vertrautes iOS-Muster. */
  .modal-head:before{content:"";position:absolute;top:9px;left:50%;transform:translateX(-50%);width:38px;height:4px;border-radius:99px;background:var(--line2)}
  .modal-body{padding-bottom:calc(20px + env(safe-area-inset-bottom,0px))}
  /* Bulk-Leiste auf Mobile: volle Breite direkt ÜBER der Navigation, nichts überlappt. */
  .bulkbar{left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom,12px));transform:none;width:100%;max-width:none;border-radius:14px 14px 0 0;border-left:none;border-right:none;border-bottom:none;flex-direction:column;align-items:stretch;gap:9px;padding:12px 14px}
  .bulk-count{text-align:center}
  .bulk-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .bulk-actions .btn{justify-content:center;width:100%}
  .bulk-actions .btn-danger{grid-column:1 / -1}
}
</style>
</head>

async function cloudLoad(table){ const {data,error}=await sb.from(table).select('*'); if(error) throw error; return data.map(r=>r.data); }
async function cloudUpsert(table,obj){ const {error}=await sb.from(table).upsert({id:obj.id, data:obj}); if(error) throw error; }

   Einmal pro Tag wird beim App-Start ein vollständiger Snapshot (Produkte,

/* ---------- Export-Backups je Jahr (Punkt 4) ----------
   Beim Excel-Export wird die zuletzt exportierte Verderb-Version pro Jahr in
   der Cloud gesichert (Tabelle 'export_backups', genau EINE Zeile je Jahr).
   Erneuter Export desselben Jahres überschreibt die gespeicherte Version. */
function exportKey(filterYear){ return filterYear==null ? 'gesamt' : String(filterYear); }
async function saveExportSnapshot(filterYear, rows){
  if(!USE_CLOUD) return;
  try{
    const key=exportKey(filterYear);
    await sb.from('export_backups').upsert({
      id:key, year:(filterYear==null?null:filterYear),
      exported_at:new Date().toISOString(),
      data:{ jahr:key, positionen:rows }

  }catch(e){ /* still: darf den Export nie stören */ }

async function getExportSnapshot(filterYear){
  if(!USE_CLOUD) return null;

      </div>

  showModal();
}

async function autoBackupIfDue(){
  if(!USE_CLOUD) return;
  const today=new Date().toISOString().slice(0,10);

    const id=today+'_'+Date.now().toString(36);
    const {error}=await sb.from('backups').insert({ id, created_at:new Date().toISOString(), data:snapshot });
    if(error) throw error;
    localStorage.setItem('thein_lastbackup', today);
    // Alte Backups aufräumen: nur die neuesten 30 behalten.
    const {data}=await sb.from('backups').select('id').order('created_at',{ascending:false});
    if(data && data.length>30){ const old=data.slice(30).map(r=>r.id); await sb.from('backups').delete().in('id',old); }

/* ---------- Helpers ---------- */
const $ = id => document.getElementById(id);
const num = v => { const n = parseFloat(String(v).replace(',','.')); return isNaN(n)?0:n; };
const eur = v => num(v).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2});
const r2 = v => Math.round(num(v)*100)/100;
const r4 = v => Math.round(num(v)*10000)/10000;
/* Nachvollziehbare Summe: erst den ANGEZEIGTEN Einzelpreis auf Cent runden
   (genau die Zahl, die in der Tabelle steht), dann × Menge, dann summieren.
   So ergibt „angezeigter Einzelpreis × Menge, alles zusammengezählt" exakt
   die Summe — wie man es im Kopf nachrechnet. */
function sumCent(rows, field){
  return rows.reduce((s,w)=> s + r2(w[field]) * num(w.menge||1), 0);
}
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function nextId(arr){ let m=0; arr.forEach(x=>{const n=parseInt(x.id);if(!isNaN(n)&&n>m)m=n}); return String(m+1); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); } // geräteübergreifend eindeutig

/* ---------- Suche: tolerant (Teilbegriffe, Umlaute, Tippfehler) ---------- */
function norm(s){
  return String(s==null?'':s).toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')   // Akzente weg
    .replace(/ß/g,'ss').replace(/[^a-z0-9]+/g,' ').trim();
}
function lev(a,b){ // kleine Levenshtein-Distanz (für kurze Tokens, schnell genug)
  if(a===b) return 0; const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
  let prev=Array.from({length:n+1},(_,i)=>i), cur=new Array(n+1);
  for(let i=1;i<=m;i++){ cur[0]=i;
    for(let j=1;j<=n;j++){ const c=a[i-1]===b[j-1]?0:1; cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+c); }
    [prev,cur]=[cur,prev];
  }
  return prev[n];
}
function fuzzyMatch(query, haystack){
  const q=norm(query); if(!q) return true;
  const h=norm(haystack); if(h.includes(q)) return true;            // schneller Volltreffer
  if(h.replace(/ /g,'').includes(q.replace(/ /g,''))) return true;  // ohne Leerzeichen („cocacola")
  const hw=h.split(' ');
  return q.split(' ').every(qt=>{
    if(!qt) return true;
    if(h.includes(qt)) return true;                                  // Teilbegriff irgendwo
    const tol = qt.length>=5 ? 2 : (qt.length>=3 ? 1 : 0);           // Tippfehler-Toleranz nach Länge
    return hw.some(w => w.includes(qt) || (Math.abs(w.length-qt.length)<=tol && lev(w,qt)<=tol));
  });
}
/* Marke = Teil vor dem ersten „ - " im Namen (Format „Marke - Artikel - Menge"). */
function brandOf(p){ const n=String(p.name||''); const i=n.indexOf(' - '); return (i>0?n.slice(0,i):n).trim(); }
const BELIEBT_RANK = { 'hoch':3,'mittel':2,'niedrig':1,'keine angabe':0,'':0 };

/* ---------- Zentrale Filter+Sortier-Logik (eine Quelle der Wahrheit) ---------- */
/* Erstelldatum eines Produkts als ms-Timestamp.
   Nutzt _created falls vorhanden, sonst den in der uid() codierten Zeitstempel
   (erste 8 Zeichen = Date.now() in base36). So funktioniert „zuletzt hinzugefügt"
   auch rückwirkend für Bestandsprodukte. Alte Zähl-IDs (1,2,3…) -> 0 (ans Ende). */
/* Ein Produkt gilt als unvollständig, wenn EK fehlt ODER MHD fehlt —
   außer es ist bewusst als „lange haltbar / kein MHD" markiert. */
function istOhneMhd(p){ return !p.kein_mhd && !String(p.mhd||'').trim(); }
function istUnvollstaendig(p){ return num(p.rohpreis)<=0 || istOhneMhd(p); }
function createdOf(p){
  if(p._created){ const t=Date.parse(p._created); if(!isNaN(t)) return t; }
  const id=String(p.id||'');
  if(/^[0-9a-z]{8,}$/.test(id)){
    const ms=parseInt(id.slice(0,8),36);
    if(!isNaN(ms) && ms>1600000000000 && ms<2000000000000) return ms;   // Plausi: 2020–2033
  }
  return 0;
}
const SORT_FIELDS = {
  name:    { label:'Name',           val:p=>norm(p.name), type:'str' },
  marke:   { label:'Marke',          val:p=>norm(brandOf(p)), type:'str' },
  kategorie:{label:'Kategorie',      val:p=>norm(p.kategorie), type:'str' },
  preis:   { label:'Preis',          val:p=>rechnePreis(p).verkauf, type:'num' },
  db:      { label:'Deckungsbeitrag',val:p=>rechnePreis(p).deckungsbeitrag, type:'num' },
  beliebt: { label:'Beliebtheit',    val:p=>BELIEBT_RANK[String(p.beliebtheit||'').toLowerCase()]??0, type:'num' },
  mhd:     { label:'Ablaufdatum (MHD)',val:p=>{ const t=mhdTage(p.mhd); return t==null?Infinity:t; }, type:'num' },
  neu:     { label:'Zuletzt hinzugefügt',val:p=>createdOf(p), type:'num' },
  geaendert:{label:'Zuletzt geändert',val:p=>p._updated?Date.parse(p._updated)||0:0, type:'num' }
};
function cmpBy(key, dir){
  const f=SORT_FIELDS[key]; if(!f) return ()=>0;
  const s = dir==='desc' ? -1 : 1;
  return (a,b)=>{
    const va=f.val(a), vb=f.val(b);
    let c = f.type==='num' ? (va-vb) : String(va).localeCompare(String(vb),'de');
    if(Number.isNaN(c)) c=0;
    return c*s;
  };
}
function getVisibleProducts(dupes){
  dupes = dupes || (filter.dupes ? duplicateIds() : null);
  let list = products.filter(p=>{
    if(search && !fuzzyMatch(search, [p.name,p.kategorie,p.ean].filter(Boolean).join(' '))) return false;
    if(filter.kat && p.kategorie!==filter.kat) return false;
    if(filter.abweichung && !rechnePreis(p).abweichung) return false;
    if(filter.dupes && dupes && !dupes.has(p.id)) return false;
    if(filter.unvollstaendig && !istUnvollstaendig(p)) return false;
    return true;
  });
  const c1=cmpBy(sort1, sort1dir);
  const c2= sort2 ? cmpBy(sort2,'asc') : null;
  const cName = cmpBy('name','asc');
  list.sort((a,b)=>{ let c=c1(a,b); if(c) return c; if(c2){ c=c2(a,b); if(c) return c; } return cName(a,b); });
  return list;
}
function toast(msg){ const t=$('toast'); t.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>'+esc(msg); t.classList.add('show'); t.classList.remove('undo'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400); }
/* Toast mit „Rückgängig"-Button (für Löschungen). onUndo wird bei Klick ausgeführt. */
let _undoFn=null;
function toastUndo(msg, onUndo){
  const t=$('toast'); _undoFn=onUndo;
  t.innerHTML = '<span style="flex:1">'+esc(msg)+'</span><button class="toast-undo" onclick="runUndo()">Rückgängig</button>';
  t.classList.add('show','undo'); clearTimeout(t._t);
  t._t=setTimeout(()=>{ t.classList.remove('show','undo'); _undoFn=null; }, 6000);
}
function runUndo(){ const fn=_undoFn; _undoFn=null; const t=$('toast'); t.classList.remove('show','undo'); if(fn) fn(); }

/* =====================================================================
   PREIS-ENGINE — fachlich geprüft & dokumentiert.
   Ablauf wie in der Ursprungs-Excel: EK -> Soll-Marge -> VK netto -> +USt -> +Pfand -> AUFrunden.

   GRUNDSÄTZE
   - Marge & Gewinn IMMER auf Netto-Basis. Die USt. ist ein durchlaufender Posten
     (wird vereinnahmt und ans Finanzamt abgeführt), zählt also nie als Gewinn.
   - Pfand ist ebenfalls reiner Durchlaufposten: NICHT versteuert, NICHT margenwirksam.
     Es wird nur beim Brutto-Endpreis oben drauf addiert und beim Rückrechnen wieder
     abgezogen -> verfälscht Gewinn/Marge nicht.
   - "Soll-Marge" = Aufschlag auf den Netto-EK (100 % => doppelter Netto-EK).
   - Preisvorschlag wird AUFgerundet (Math.ceil) -> nie unter Wert verkaufen.

   8 KPIs (paarweise), alle fachlich definiert:
     ekNetto     EK netto       Wareneinkauf ohne Vorsteuer
     ekBrutto    EK brutto       Wareneinkauf inkl. Vorsteuer (real bezahlt)
     vkNetto     VK netto        Verkaufspreis ohne USt. (Pfand rausgerechnet)
     vkBrutto    Verkaufspreis   Endpreis für den Kunden inkl. USt. (+Pfand)
     gewinn      Gewinn/Stück    vkNetto - ekNetto  (Rohertrag je Stück, netto)
     margeNetto  Marge           gewinn / vkNetto * 100  (Handelsspanne)
     aufschlag   Aufschlag a.EK  gewinn / ekNetto * 100  (Kalkulationszuschlag)
     ustAnteil   USt./Stück      vkBrutto - Pfand - vkNetto  (ans FA abzuführen)
   ===================================================================== */
function rechnePreis(p){
  const mwstEk = num(p.mwst_ek ?? settings.default_mwst);
  const roh = num(p.rohpreis);
  let ekNetto, ekBrutto;
  if((p.netto_brutto||'brutto') === 'brutto'){ ekBrutto = roh; ekNetto = roh/(1+mwstEk/100); }
  else { ekNetto = roh; ekBrutto = roh*(1+mwstEk/100); }

  // Pfand nur wenn aktiviert; steuerneutraler Durchlaufposten.
  const pfand = p.pfand_aktiv ? num(p.pfand_betrag) : 0;

  const margeSoll = num(p.marge_soll ?? settings.default_marge);
  const mwstVk = num(p.mwst_vk ?? mwstEk);
  const wunschNetto  = ekNetto*(1+margeSoll/100);
  const wunschBrutto = wunschNetto*(1+mwstVk/100) + pfand;

  // AUFrunden auf Rundungsstufe (1e-9 fängt Float-Ungenauigkeit ab).
  const step = num(settings.rundung)||0.10;
  const gerundet = Math.ceil((wunschBrutto - 1e-9)/step)*step;

  // Tatsächlicher VK (brutto): Aktion > Preisschild > Vorschlag.
  const aktion = (p.aktionspreis!=null && p.aktionspreis!=='') ? num(p.aktionspreis) : null;
  const schildVal = (p.preisschild!=null && p.preisschild!=='') ? num(p.preisschild) : null;
  const vkBrutto = aktion!=null ? aktion : (schildVal!=null ? schildVal : gerundet);

  // Rückrechnung auf netto (Pfand vorher abziehen).
  const vkNetto = (vkBrutto - pfand)/(1+mwstVk/100);
  const gewinn = vkNetto - ekNetto;
  const margeNetto = vkNetto>0 ? gewinn/vkNetto*100 : 0;
  const aufschlag  = ekNetto>0 ? gewinn/ekNetto*100 : 0;
  const ustAnteil  = vkBrutto - pfand - vkNetto;

  // Warnung NUR wenn tatsächlicher Preis UNTER dem Vorschlag liegt (zu billig).
  const abweichung = (vkBrutto + 1e-9) < gerundet;

  return {
    ekNetto, ekBrutto, vkNetto, vkBrutto, gerundet, verkauf:vkBrutto,
    schild: schildVal!=null?schildVal:gerundet, pfand,
    gewinn, margeNetto, aufschlag, ustAnteil, abweichung, aktion:aktion!=null,
    // rückwärtskompatibel (alte Namen, die anderswo noch genutzt werden):
    endNetto:wunschNetto, endBrutto:wunschBrutto, deckungsbeitrag:gewinn, margeIst:aufschlag
  };
}

/* ---------- MHD-Helfer ---------- */
function mhdTage(mhd){ if(!mhd) return null; const iso=mhdISO(mhd); const d=new Date(iso||mhd); if(isNaN(d))return null; return Math.ceil((d - new Date())/86400000); }
/* MHD-Status für Ampel/Logik. warnDays aus Settings (Default 7). */
function warnDays(){ const n=num(settings.mhd_warn_tage); return n>0?n:7; }
function mhdStatus(p){
  if(p && p.kein_mhd) return {key:'none', t:null};   // lange haltbar -> nie in Ablauf-Überwachung
  const t=mhdTage(p.mhd);
  if(t==null) return {key:'none', t:null};
  if(t<0)  return {key:'expired', t};
  if(t===0)return {key:'today', t};
  if(t<=warnDays()) return {key:'soon', t};
  return {key:'ok', t};
}
function fmtDate(d){ const x=new Date(d); return isNaN(x)?'':x.toLocaleDateString('de-DE'); }

function renderDashboard(){
  const n = products.length;

  let margenSum=0, margenCnt=0, unterVorschlag=[], schwach=[], negativ=0;
  products.forEach(p=>{
    const c=rechnePreis(p);
    if(c.vkNetto>0){ margenSum+=c.margeNetto; margenCnt++; }
    if(c.abweichung) unterVorschlag.push({p,c});
    if(c.gewinn<0) negativ++;
    else if(c.margeNetto<20 && c.vkNetto>0) schwach.push({p,c});

  const avgMarge = margenCnt? (margenSum/margenCnt) : 0;

  // Ablauf-Kandidaten (gleiche Logik wie Warenverderb)
  const ablauf = products.map(p=>({p,st:mhdStatus(p)}))
    .filter(x=>x.st.key==='expired'||x.st.key==='today'||x.st.key==='soon')
    .sort((a,b)=>(a.st.t??0)-(b.st.t??0));
  const abgelaufen = ablauf.filter(x=>x.st.key==='expired'||x.st.key==='today').length;

  // Verderb laufendes Jahr
  const jahr=new Date().getFullYear();

  const verderbBrutto = sumCent(wasteJahr, 'ek_brutto');

  // Verderb-Gründe (laufendes Jahr) zählen
  const grundCount={};
  wasteJahr.forEach(w=>{ const g=w.grund||w.typ||'—'; grundCount[g]=(grundCount[g]||0)+num(w.menge||1); });

        <h3>Verderb ${jahr} <span class="dashcard-sub">nach Grund</span></h3>

function toggleFilter(k){ filter[k]=!filter[k]; render(); }
/* ---------- Multi-Select / Bulk-Aktionen ---------- */
function toggleSelectMode(){ selectMode=!selectMode; selectedIds.clear(); render(); renderBulkBar(); }
function toggleSelect(id){
  if(selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  lightRenderProducts(); renderBulkBar();
}
function toggleSelectAll(on){
  const vis=getVisibleProducts();
  if(on) vis.forEach(p=>selectedIds.add(p.id)); else vis.forEach(p=>selectedIds.delete(p.id));
  lightRenderProducts(); renderBulkBar();
}
/* Schwebende Aktionsleiste unten — nur sichtbar, wenn etwas ausgewählt ist. */
function renderBulkBar(){
  let bar=$('bulkBar');
  if(!selectMode || selectedIds.size===0){ if(bar) bar.remove(); return; }
  if(!bar){ bar=document.createElement('div'); bar.id='bulkBar'; bar.className='bulkbar'; document.body.appendChild(bar); }
  bar.innerHTML = `
    <span class="bulk-count">${selectedIds.size} ausgewählt</span>
    <div class="bulk-actions">
      <button class="btn btn-ghost btn-sm" onclick="bulkCategory()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9h18M9 21V9M5 3h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg>Kategorie</button>
      <button class="btn btn-ghost btn-sm" onclick="bulkMarge()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>Marge</button>
      <button class="btn btn-ghost btn-sm" onclick="bulkMwst()">MwSt</button>
      <button class="btn btn-ghost btn-sm" onclick="bulkDuplicate()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Duplizieren</button>
      <button class="btn btn-danger btn-sm" onclick="bulkDelete()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>Löschen</button>
    </div>`;
}
function selectedProducts(){ return products.filter(p=>selectedIds.has(p.id)); }
async function applyBulk(changeFn, msg){
  const sel=selectedProducts(); if(!sel.length) return;
  sel.forEach(p=>{ changeFn(p); p._updated=new Date().toISOString(); });
  persist(); render(); renderBulkBar();
  if(USE_CLOUD){ try{ for(const p of sel) await cloudUpsert('products', p); toast(msg); }catch(e){ toast('Lokal gespeichert (Cloud-Fehler)'); } }
  else toast(msg);
}
function bulkCategory(){
  const opts=allCategories();
  $('modal').innerHTML = `
    <div class="modal-head"><h2>Kategorie zuweisen</h2><button class="x" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <p class="d" style="margin-top:0">${selectedIds.size} Produkte bekommen diese Kategorie:</p>
      <div class="field full"><input id="bulkKat" placeholder="Neue Kategorie tippen…" oninput="filterBulkKatChips()" onkeydown="if(event.key==='Enter')doBulkCategory()" autofocus></div>
      ${opts.length?`<div class="bulkkat-chips" id="bulkKatChips">${opts.map(k=>`<button type="button" class="katchip" data-cat="${esc(k.toLowerCase())}" onclick="doBulkCategory('${String(opts.indexOf(k))}')">${esc(k)}</button>`).join('')}</div>`:''}
      <div class="modal-btnrow">
        <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-acc" onclick="doBulkCategory()">Zuweisen</button>
      </div>
    </div>`;
  showModal(); setTimeout(()=>$('bulkKat')&&$('bulkKat').focus(),50);
}
/* Chip-Klick übergibt einen Index in allCategories(); Tippen+Button nutzt das Textfeld. */
function doBulkCategory(idx){
  let k;
  if(idx!=null && idx!==''){ k=allCategories()[parseInt(idx)]; }
  else { k=$('bulkKat')?$('bulkKat').value.trim():''; }
  if(k==null) k='';
  closeModal(); applyBulk(p=>p.kategorie=k, k?'Kategorie gesetzt':'Kategorie geleert');
}
function filterBulkKatChips(){
  const q=($('bulkKat')?$('bulkKat').value:'').toLowerCase().trim();
  const box=$('bulkKatChips'); if(!box) return;
  box.querySelectorAll('.katchip').forEach(c=>{ c.style.display = (!q || c.dataset.cat.includes(q))?'':'none'; });
}
function bulkMarge(){
  $('modal').innerHTML = `
    <div class="modal-head"><h2>Soll-Marge setzen</h2><button class="x" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>

        <button class="btn btn-acc" style="flex:1;justify-content:center" onclick="doBulkMarge()">Setzen</button>
      </div>

}

function bulkMwst(){
  $('modal').innerHTML = `
    <div class="modal-head"><h2>MwSt-Satz setzen</h2><button class="x" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>

        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="doBulkMwst(7)">7 %</button>
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="doBulkMwst(19)">19 %</button>
      </div>
      <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:10px" onclick="closeModal()">Abbrechen</button>
    </div>`;
  showModal();
}
function doBulkMwst(v){ closeModal(); applyBulk(p=>p.mwst_ek=v, 'MwSt gesetzt'); }
function bulkDuplicate(){
  const sel=selectedProducts(); if(!sel.length) return;
  const copies=sel.map(p=>({...p, id:uid(), name:(p.name||'')+' (Kopie)', _updated:new Date().toISOString()}));
  copies.forEach(c=>products.push(c)); persist(); selectedIds.clear(); render(); renderBulkBar();
  if(USE_CLOUD){ (async()=>{ try{ for(const c of copies) await cloudUpsert('products', c); toast(copies.length+' dupliziert'); }catch(e){ toast('Lokal dupliziert (Cloud-Fehler)'); } })(); }
  else toast(copies.length+' dupliziert');
}
function bulkDelete(){
  const n=selectedIds.size; if(!n) return;
  $('modal').innerHTML = `
    <div class="modal-head"><h2>${n} Produkte löschen?</h2><button class="x" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <p class="d" style="margin-top:0"><b>${n} Produkt${n===1?'':'e'}</b> werden endgültig gelöscht${USE_CLOUD?' — auf allen Geräten':''}. Rückgängig per „Rückgängig" direkt danach möglich.</p>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-danger" style="flex:1;justify-content:center" onclick="doBulkDelete()">Löschen</button>
      </div>
    </div>`;
  showModal();
}
function doBulkDelete(){
  const removed=selectedProducts(); const ids=new Set(removed.map(p=>p.id));
  products=products.filter(p=>!ids.has(p.id)); persist(); selectedIds.clear(); closeModal(); render(); renderBulkBar();
  if(USE_CLOUD){ (async()=>{ for(const p of removed){ try{ await cloudDelete('products', p.id); }catch(e){} } })(); }
  toastUndo(removed.length+' gelöscht', ()=>{
    removed.forEach(p=>products.push(p)); persist(); render();
    if(USE_CLOUD){ (async()=>{ for(const p of removed){ try{ await cloudUpsert('products', p); }catch(e){} } })(); }
    toast('Wiederhergestellt');
  });
}
/* Produkt duplizieren — neue ID, Name + " (Kopie)", sofort sichtbar. */
function dupProduct(id){
  const p=products.find(x=>x.id===id); if(!p) return;
  const copy={...p, id:uid(), name:(p.name||'')+' (Kopie)', _updated:new Date().toISOString()};
  products.push(copy); persist(); render();
  if(USE_CLOUD){ cloudUpsert('products', copy).then(()=>toast('Dupliziert')).catch(()=>toast('Lokal dupliziert (Cloud-Fehler)')); }
  else toast('Dupliziert');
}

/* Gebinde -> Rohpreis pro Stück. Gibt {ok, perUnit} zurück. */
function applyGebinde(){
  if(!$('f_geb')||!$('f_geb').checked) return {ok:false};
  const total=num($('f_gebpreis').value), stk=num($('f_gebstk').value);
  const hint=$('gebHint');
  if(total>0 && stk>0){
    const per=total/stk;
    if($('f_roh')) $('f_roh').value = (Math.round(per*10000)/10000).toString().replace('.',',');
    if(hint) hint.innerHTML = `<b>${eur(per)} €</b> pro Stück &nbsp;·&nbsp; ${eur(total)} € ÷ ${stk} Stück`;
    return {ok:true, perUnit:per};
  }
  if(hint) hint.textContent='Gebindepreis und Stückzahl eingeben…';
  return {ok:false};
}

function saveProduct(id){
  const data = readForm();
  if(!data.name){ toast('Bitte einen Namen eingeben'); const e=$('f_name'); if(e)e.focus(); return; }
  if(!data.kein_mhd && !data.mhd){ toast('Bitte MHD eintragen (Pflichtfeld)'); const e=$('f_mhd'); if(e){ try{ e.focus(); }catch(_){ } setTimeout(()=>{ try{ if(e.showPicker) e.showPicker(); }catch(_){ } }, 0); } return; }
  // Schutz vor Daten-Verlust: Ein bestehender Artikel wird nachgekauft -> sein MHD ändert sich.
  // War das ALTE MHD bereits abgelaufen/läuft heute ab, muss zuerst entschieden werden, was
  // mit der alten (verdorbenen) Charge passiert, BEVOR das alte MHD überschrieben wird.
  // Sonst verschwindet die Charge spurlos aus der Ablauf-Überwachung -> kein Steuerabzug.
  // Beide MHDs auf YYYY-MM-DD normalisieren, damit reine Formatunterschiede nicht auslösen.
  if(id){
    const old = products.find(x=>x.id===id);
    if(old && old.mhd && data.mhd){
      const a = mhdISO(old.mhd), b = mhdISO(data.mhd);
      // Auslösen, sobald sich das MHD ändert UND das alte MHD in der Vergangenheit/heute lag.
      const t = mhdTage(old.mhd);
      if(a && b && a !== b && t!=null && t<=0){
        const st = mhdStatus(old);
        _mhdChangeCtx = { id, oldMhd: old.mhd, oldStatus: st, oldDays: t, newData: data };
        showMhdChangeDialog();
        return;
      }
    }
  }
  doSaveProduct(id, data);
}
/* Normalisiert ein MHD (TT.MM.JJJJ oder ISO) auf YYYY-MM-DD für stabilen Vergleich. */
function mhdISO(s){
  s=String(s||'').trim(); if(!s) return '';
  let m=s.match(/^(\d{4})-(\d{2})-(\d{2})/); if(m) return m[1]+'-'+m[2]+'-'+m[3];
  m=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if(m){ const dd=m[1].padStart(2,'0'), mm=m[2].padStart(2,'0'); return m[3]+'-'+mm+'-'+dd; }
  return '';
}
/* Eigentliches Speichern — herausgezogen, damit der MHD-Schutz-Dialog es aufrufen kann.
   skipRender: true, wenn vorher schon ein Verderb gebucht wurde (vermeidet Doppel-Render). */
function doSaveProduct(id, data){
  data._updated = new Date().toISOString();   // für „zuletzt geändert"-Sortierung
  let saved;
  if(id){
    const i=products.findIndex(x=>x.id===id);
    const prev=products[i]||{};
    // Preishistorie: EK oder VK-Änderung protokollieren (max. 12 Einträge).
    const ekAlt=num(prev.rohpreis), ekNeu=num(data.rohpreis);
    const vkAlt=prev.preisschild===''||prev.preisschild==null?null:num(prev.preisschild);
    const vkNeu=data.preisschild===''||data.preisschild==null?null:num(data.preisschild);
    let log=Array.isArray(prev._pricelog)?[...prev._pricelog]:[];
    if(ekAlt!==ekNeu || vkAlt!==vkNeu){
      log.push({ t:data._updated, ekAlt, ekNeu, vkAlt, vkNeu });
      if(log.length>12) log=log.slice(-12);
    }
    saved = products[i] = {...prev, ...data, _pricelog:log};
  }
  else  { saved = {id:uid(), _created:new Date().toISOString(), ...data}; products.push(saved); }
  persist(); closeModal(); render();                       // sofort sichtbar
  (async()=>{
    if(saved.ean) await learnEan(saved.ean, saved.name);   // Name für diese EAN merken
    if(USE_CLOUD){ try{ await cloudUpsert('products', saved); toast(id?'Gespeichert':'Produkt angelegt'); }
                   catch(e){ toast('Lokal gespeichert (Cloud-Fehler)'); } }
    else toast(id?'Gespeichert':'Produkt angelegt');
  })();
}
/* Bucht einen Verderb OHNE sofortiges Render/Modal (für Aufrufe aus dem MHD-Dialog). */
function bookWasteSilent(p, grund, extra){
  const c=rechnePreis(p);
  const saved = { id:uid(), grund, typ:(grund==='Privatentnahme'?'privat':'verderb'),
    warenbezeichnung:p.name||'', menge:'1',
    einzelpreis: c.verkauf!=null?r2(c.verkauf):'', mwst:String(num(p.mwst_ek||settings.default_mwst)),
    mhd:fmtDate(p.mhd), ek_brutto:r2(c.ekBrutto), ek_netto:r4(c.ekNetto),
    private_entnahme:'', kommentar:'', _updated:new Date().toISOString(), ...extra };
  waste.push(saved); persist();
  if(USE_CLOUD){ cloudUpsert('waste', saved).catch(()=>{}); }
  return saved;
}
/* Dialog: Ein nachgekaufter Artikel bekommt ein neues MHD — was ist mit der ALTEN,
   abgelaufenen Charge passiert? Stil & Felder = Warenverderb-Formular, alles vorbefüllt.

  $('modal').innerHTML = `

        <div><b>${esc(prod.name||'Artikel')}</b> wird nachgekauft. Die alte Charge war <b>${esc(expText)}</b> (MHD ${esc(fmtDate(mhdISO(ctx.oldMhd)||ctx.oldMhd))}).<br>

      </div>

      <div class="fgrid" style="margin-top:16px">
        <div class="field"><label>Menge (Stück)</label><input id="mhdc_menge" inputmode="numeric" value="1" oninput="mhdChangePreview()"></div>

/* Live-Vorschau: zeigt den Buchungswert (Menge × EK) netto/brutto. */
function mhdChangePreview(){
  const el=$('mhdcPreview'); if(!el) return;
  const m = num($('mhdc_menge')?$('mhdc_menge').value:1)||0;
  const ekB = num($('mhdc_ek')?$('mhdc_ek').value:0);
  const prod = products.find(x=>x.id===(_mhdChangeCtx&&_mhdChangeCtx.id)) || {};
  const mwst = num(prod.mwst_ek||settings.default_mwst)||19;
  const ekN = ekB/(1+mwst/100);
  const gesB = ekB*m, gesN = ekN*m;
  const priv = _mhdChangeGrund==='Privatentnahme';
  el.innerHTML = `<div class="mhdc-prev-row"><span>${priv?'Privatentnahme':'Verderb-Wert'} (${m||0} Stück)</span>
    <b>${eur(gesN)} € netto · ${eur(gesB)} € brutto</b></div>`;
}
function pickMhdGrund(btn, grund){
  _mhdChangeGrund = grund;
  const wrap = document.getElementById('mhdGrundChips'); if(!wrap) return;
  wrap.querySelectorAll('.grundchip').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');

function cancelMhdChange(){ _mhdChangeCtx=null; _mhdChangeGrund=null; _mhdChangeEkBrutto=null; closeModal(); }
/* Bucht die alte Charge (mit ALTEM MHD, gewählter Menge/EK/Grund) und speichert dann
   das Produkt mit dem neuen MHD — alles in einem Rutsch, ein Render. */
function mhdChangeBookSelected(){
  const ctx=_mhdChangeCtx; if(!ctx) return;
  const grund=_mhdChangeGrund||'MHD';
  const prod=products.find(x=>x.id===ctx.id);
  const m   = num($('mhdc_menge')?$('mhdc_menge').value:1)||1;
  const ekB = num($('mhdc_ek')?$('mhdc_ek').value:0);
  const mwst= num((prod&&prod.mwst_ek)||settings.default_mwst)||19;
  const ekN = ekB/(1+mwst/100);
  _mhdChangeCtx=null; _mhdChangeGrund=null; _mhdChangeEkBrutto=null;
  if(!prod){ doSaveProduct(ctx.id, ctx.newData); return; }
  const c=rechnePreis(prod);
  const extra = {
    menge: String(m),
    ek_brutto: r2(ekB),
    ek_netto: r4(ekN),
    mhd: fmtDate(mhdISO(ctx.oldMhd)||ctx.oldMhd),
    einzelpreis: c.verkauf!=null?r2(c.verkauf):'',
  };
  if(grund==='Privatentnahme') extra.private_entnahme = String(m);
  bookWasteSilent({...prod, mhd: ctx.oldMhd}, grund, extra);   // bucht ohne eigenes Render/Modal
  doSaveProduct(ctx.id, ctx.newData);                          // speichert + schließt + rendert EINMAL
  setTimeout(()=>toast(grund==='Privatentnahme'?'Privatentnahme gebucht · MHD aktualisiert':'Alte Charge gebucht ('+grund+') · MHD aktualisiert'), 60);
}

  const ctx=_mhdChangeCtx; if(!ctx) return;
  _mhdChangeCtx=null; _mhdChangeGrund=null; _mhdChangeEkBrutto=null;

function setScanStatus(t){ const el=$('scanStatus'); if(el) el.textContent=t; }
/* Nur Handels-Barcodes -> schneller & treffsicherer als „alle Formate". */
function retailFormats(){
  const F = Html5QrcodeSupportedFormats;
  return [F.EAN_13, F.EAN_8, F.UPC_A, F.UPC_E, F.UPC_EAN_EXTENSION, F.CODE_128, F.ITF];
}
async function startCam(){
  if(typeof Html5Qrcode === 'undefined'){ setScanStatus('Scanner-Bibliothek nicht geladen — nutze die manuelle Eingabe.'); return; }
  setScanStatus('Kamera wird gestartet…');
  try{
    html5qr = new Html5Qrcode("reader", {
      formatsToSupport: retailFormats(),
      experimentalFeatures: { useBarCodeDetectorIfSupported: true }, // nativer, scharfer Decoder wo verfügbar
      verbose: false
    });
  }catch(e){ setScanStatus('Scanner-Init fehlgeschlagen — manuelle Eingabe nutzen.'); return; }

  /* Beste Rückkamera wählen: Ultraweit-/Tele-/Frontlinsen fokussieren nah schlecht. */
  let cam = { facingMode: "environment" };
  try{
    const cams = await Html5Qrcode.getCameras();
    if(cams && cams.length){
      const bad = /front|user|wide|ultra|tele|depth|truedepth|ir\b/i;
      const back = cams.filter(c => /back|rear|environment|rück|hinten/i.test(c.label||''));
      const pick = back.find(c=>!bad.test(c.label||'')) || back[0]
                 || cams.find(c=>!bad.test(c.label||'')) || cams[cams.length-1];
      if(pick) cam = { deviceId: { exact: pick.id } };
    }
  }catch(e){ /* getCameras kann scheitern -> facingMode-Fallback bleibt */ }

  const config = {
    fps: 15,
    qrbox: (vw, vh) => { const s = Math.floor(Math.min(vw, vh) * 0.82); return { width:s, height:Math.floor(s*0.62) }; },
    aspectRatio: (window.innerHeight > window.innerWidth) ? 1.0 : 1.7777,
    videoConstraints: {
      ...(cam.deviceId ? { deviceId: cam.deviceId } : { facingMode: { ideal: "environment" } }),
      width:  { ideal: 1920 },   // höhere Auflösung -> dichte/kleine EAN lesbar
      height: { ideal: 1080 },
      advanced: [{ focusMode: "continuous" }] // Dauer-Autofokus
    }
  };

  html5qr.start(
    cam, config,
    code => { if(scanHandled) return; scanHandled=true;       // nur einmal auslösen
              try{ navigator.vibrate && navigator.vibrate(60); }catch(_){}
              stopCam(); setScanStatus('Gescannt: '+code); lookupEan(code); },
    () => {} // Frame-Fehler ignorieren
  )
  .then(()=>{ setScanStatus('Halte einen Barcode in den Rahmen…'); setupTorch(); })
  .catch(e=>setScanStatus('Kamera nicht verfügbar ('+e+') — nutze die manuelle Eingabe.'));
}
function setupTorch(){
  try{
    const video = $('reader') && $('reader').querySelector('video');
    const track = video && video.srcObject && video.srcObject.getVideoTracks()[0];
    if(!track || !track.getCapabilities) return;
    if(track.getCapabilities().torch){ torchTrack = track; const b=$('torchBtn'); if(b) b.style.display='inline-flex'; }
  }catch(e){}
}
async function toggleTorch(){
  if(!torchTrack){ toast('Blitz nicht verfügbar'); return; }
  try{
    const on = !torchTrack._on;
    await torchTrack.applyConstraints({ advanced:[{ torch:on }] });
    torchTrack._on = on; const b=$('torchBtn'); if(b) b.textContent = on?'🔦 An':'🔦 Aus';
  }catch(e){ toast('Blitz nicht unterstützt'); }
}
function stopCam(){
  torchTrack=null; const b=$('torchBtn'); if(b){ b.style.display='none'; b.textContent='🔦 Aus'; }
  if(html5qr){ try{ html5qr.stop().then(()=>html5qr.clear()).catch(()=>{}); }catch(e){} html5qr=null; }
}
function closeScanner(){ stopCam(); closeModal(); }
/* OpenFoodFacts ist crowdsourced & nur Lebensmittel. Schwester-DBs decken den Rest ab.
   Reihenfolge: Lebensmittel zuerst (häufigster Fall im Automaten), dann allg. Produkte, dann Beauty. */
const OFF_DBS = [
  'https://world.openfoodfacts.org',     // Lebensmittel
  'https://world.openproductsfacts.org', // alles andere (Non-Food)
  'https://world.openbeautyfacts.org'    // Kosmetik / Hygiene
];
async function offLookup(base, ean){
  try{
    const res = await fetch(`${base}/api/v2/product/${ean}.json?fields=product_name,product_name_de,generic_name,brands,quantity`,{cache:'no-store'});
    if(!res.ok) return null;
    const j = await res.json();
    if(j.status===1 && j.product){
      const pr=j.product;
      // Format „Marke - Artikelname - Menge" — fehlende Teile fallen weg.
      const brand = (pr.brands||'').split(',')[0].trim();                       // erste Marke
      const title = (pr.product_name_de||pr.product_name||pr.generic_name||'').trim();
      const qty   = (pr.quantity||'').trim();
      const name  = [brand, title, qty].filter(Boolean).join(' - ');
      if(name) return name;
    }
  }catch(e){}
  return null;
}
async function lookupEan(ean){
  ean=String(ean||'').trim(); if(!ean){ toast('Bitte EAN eingeben'); return; }
  const existing = products.find(p=>p.ean===ean);
  if(existing){ closeScanner(); toast('Produkt bereits vorhanden'); openProduct(existing.id); return; }

  // Formular SOFORT öffnen (kein Warten auf die API) — Name wird nachgereicht, sobald gefunden.
  closeScanner();
  openProduct(null, { ean });
  const ne=$('f_name'); if(ne) ne.placeholder='Suche '+ean+' …';

  let name = await getEanName(ean);                        // 1) gemerkter Name (sofort, auch offline)
  if(!name){ for(const base of OFF_DBS){ name=await offLookup(base, ean); if(name) break; } } // 2) OpenFoodFacts

  const el=$('f_name');
  if(el && el.value.trim()===''){          // nur befüllen, wenn noch nichts getippt
    el.placeholder='z.B. Coca Cola';
    if(name){ el.value=name; toast('Produkt erkannt'); }
    else    { toast('Nicht gefunden — Name bitte selbst eintragen'); }
  }
}

/* Verderb-Kategorien — exakte Reihenfolge laut Vorgabe, ohne Nummern. */
const VERDERB_KATS = ['MHD','Bruchware','Privatentnahme','Defekt','Retouren/Lieferfehler','Schwund','Diebstahl','Werbung/Gratisprobe'];
/* Findet das passende Produkt zur eingegebenen Bezeichnung (für Auto-Übernahme). */
function findProductByName(name){
  const n=norm(name); if(!n) return null;
  return products.find(p=>norm(p.name)===n) || products.find(p=>norm(p.name).includes(n)) || null;
}
/* Ähnlichkeit zweier Namen als 0..1 (1 = identisch). Kombiniert Zeichen- und Wort-Ebene,
   damit Tippfehler, Leerzeichen, Bindestriche und Reihenfolge tolerant behandelt werden. */
function nameSimilarity(a, b){
  const x=norm(a), y=norm(b);
  if(!x || !y) return 0;
  if(x===y) return 1;
  // 1) Zeichen-Ebene über Levenshtein auf zusammengezogenen Strings (ohne Leerzeichen).
  const cx=x.replace(/ /g,''), cy=y.replace(/ /g,'');
  const charSim = 1 - lev(cx, cy)/Math.max(cx.length, cy.length);
  // 2) Wort-Ebene: Anteil gemeinsamer Wörter (Reihenfolge egal).
  const wx=new Set(x.split(' ').filter(Boolean)), wy=new Set(y.split(' ').filter(Boolean));
  let inter=0; wx.forEach(w=>{ if(wy.has(w)) inter++; });
  const wordSim = inter/Math.max(wx.size, wy.size);
  // Mischung: Zeichen-Ebene dominiert (fängt Tippfehler), Wort-Ebene stützt (fängt Umstellungen).
  return Math.max(charSim, 0.6*charSim + 0.4*wordSim);
}
/* Bester Treffer aus den Produkten für einen Namen. Liefert {p, score} oder null. */
function bestProductMatch(name){
  let best=null, bestScore=0;
  for(const p of products){
    const s=nameSimilarity(name, p.name);
    if(s>bestScore){ bestScore=s; best=p; }
  }
  return best ? {p:best, score:bestScore} : null;
}
/* Echte 1:1-Duplikate: gleicher normalisierter Name. Liefert Set von Produkt-IDs,
   die mindestens einen Namenszwilling haben. */
function duplicateIds(){
  const byName={}, dupes=new Set();
  products.forEach(p=>{ const k=norm(p.name); if(!k) return; (byName[k]=byName[k]||[]).push(p.id); });
  Object.values(byName).forEach(ids=>{ if(ids.length>1) ids.forEach(id=>dupes.add(id)); });
  return dupes;
}
/* Zustand: welche Jahr-Gruppen sind aufgeklappt (Accordion). Standard: aktuelles Jahr. */

function ensureOpenYears(years){
  if(verderbOpenYears) return;
  verderbOpenYears = new Set();
  const cur=new Date().getFullYear();
  if(years.includes(cur)) verderbOpenYears.add(cur);
  else if(years.length) verderbOpenYears.add(years[0]);   // sonst neuestes Jahr
}

function productMhdYear(p){ const s=String(p.mhd||'');const m=s.match(/(\d{4})/);return m?parseInt(m[1]):null; }

  const q = norm(verderbSearch);
