/* Liefert das MHD-Jahr einer Verderb-Position (aus TT.MM.JJJJ oder ISO).
   Fällt zurück auf das Buchungsjahr (_updated), falls kein MHD vorhanden. */
function wasteMhdYear(w){
  const s=String(w.mhd||'').trim();
  let m=s.match(/(\d{4})/);                          // findet vierstelliges Jahr
  if(m) return parseInt(m[1]);
  if(w._updated){ const d=new Date(w._updated); if(!isNaN(d)) return d.getFullYear(); }
  return null;
}
/* Alle Jahre, die in den Verderb-Daten vorkommen (für das Dropdown). */
function wasteYears(){
  const ys=new Set(); waste.forEach(w=>{ const y=wasteMhdYear(w); if(y) ys.add(y); });
  return [...ys].sort((a,b)=>b-a);
}
/* Datum TT.MM.JJJJ / ISO -> JS-Date (für echte Excel-Datumszelle). */
function parseDateLoose(s){
  s=String(s||'').trim(); if(!s) return null;
  let m=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/); if(m) return new Date(+m[3],+m[2]-1,+m[1]);
  const d=new Date(s); return isNaN(d)?null:d;
}
/* Professioneller Excel-Export (.xlsx) mit korrekten Zell-Typen & -Formaten.
   filterYear: null = Gesamtlaufzeit, sonst nur Positionen mit diesem MHD-Jahr. */
/* Produktliste als professionelle Excel-Tabelle exportieren (Inventur/Steuerberater). */
function exportProductsXlsx(){
  if(typeof XLSX==='undefined'){ toast('Excel-Bibliothek lädt noch — kurz warten'); return; }
  if(!products.length){ toast('Keine Produkte vorhanden'); return; }
  const rows=[...products].sort((a,b)=>String(a.name||'').localeCompare(String(b.name||''),'de'));
  const aoa=[
    [settings.inhaber_name||''],
    ['Produktliste · Stand '+new Date().toLocaleDateString('de-DE')],
    [],
    ['Produkt','Kategorie','EAN','EK netto','EK brutto','MwSt. [%]','Soll-Marge [%]','Verkaufspreis','Gewinn/Stück','Marge [%]','Aufschlag [%]','MHD','Pfand']
  ];
  const headRows=aoa.length;
  rows.forEach(p=>{
    const c=rechnePreis(p);
    aoa.push([
      p.name||'', p.kategorie||'', String(p.ean||''),
      r4(c.ekNetto), r2(c.ekBrutto), num(p.mwst_ek||settings.default_mwst),
      num(p.marge_soll||settings.default_marge), r2(c.verkauf), r2(c.gewinn),
      Math.round(c.margeNetto), Math.round(c.aufschlag),
      parseDateLoose(p.mhd)||(p.mhd||''), p.pfand_aktiv?r2(num(p.pfand_betrag)):''
    ]);
  });
  const ws=XLSX.utils.aoa_to_sheet(aoa,{cellDates:true});
  ws['!cols']=[{wch:34},{wch:16},{wch:15},{wch:11},{wch:11},{wch:10},{wch:13},{wch:14},{wch:13},{wch:10},{wch:12},{wch:12},{wch:9}];
  const EUR='#,##0.00\\ "€"', PCT='0\\ "%"';
  const lastCol=12, lastRow=aoa.length-1;
  const EURCOLS=new Set([3,4,7,8,12]), PCTCOLS=new Set([5,6,9,10]);
  const NUMCOLS=new Set([3,4,5,6,7,8,9,10,12]);
  for(let r=headRows;r<=lastRow;r++){
    for(let c=0;c<=lastCol;c++){
      const cell=ws[XLSX.utils.encode_cell({r,c})]; if(!cell) continue;
      if(EURCOLS.has(c)) cell.z=EUR;
      else if(PCTCOLS.has(c)) cell.z=PCT;
      else if(c===11 && cell.t==='d') cell.z='dd.mm.yyyy';
      cell.s={alignment:{horizontal:NUMCOLS.has(c)?'center':'left',vertical:'center'}};
    }
  }
  for(let c=0;c<=lastCol;c++){ const cell=ws[XLSX.utils.encode_cell({r:headRows-1,c})]; if(cell) cell.s={font:{bold:true},alignment:{horizontal:'center',vertical:'center',wrapText:true}}; }
  ws['!autofilter']={ref:`${XLSX.utils.encode_cell({r:headRows-1,c:0})}:${XLSX.utils.encode_cell({r:lastRow,c:lastCol})}`};
  ws['!freeze']={xSplit:0,ySplit:headRows};
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Produkte');
  XLSX.writeFile(wb,'produktliste_'+new Date().toISOString().slice(0,10)+'.xlsx',{cellDates:true});
  toast('Produktliste exportiert');
}

/* Professioneller Excel-Export der Verderb-Daten (.xlsx) mit korrekten Zell-Typen.
   filterYear: null = Gesamtlaufzeit, sonst nur Positionen mit diesem MHD-Jahr. */
function exportVerderbXlsx(filterYear){
  if(typeof XLSX==='undefined'){ toast('Excel-Bibliothek lädt noch — kurz warten'); return; }
  const rows = waste.filter(w => filterYear==null || wasteMhdYear(w)===filterYear)
                    .sort((a,b)=>String(a.warenbezeichnung||'').localeCompare(String(b.warenbezeichnung||''),'de'));
  if(!rows.length){ toast('Keine Positionen für diesen Zeitraum'); return; }
  const jahrLabel = filterYear==null ? 'Gesamt' : String(filterYear);

  // Kopfzeilen wie in Thomas' Vorlage + Spaltenüberschriften.
  const aoa = [
    [settings.inhaber_name||''],
    ['Email: '+(settings.inhaber_email||'')],
    [jahrLabel+' - Warenverderb'],
    [],
    ['Grund','Warenbezeichnung','Menge','Einzelpreis','MwSt. [%]','MHD','Einkaufspreis Brutto','Einkaufspreis Netto','privat entnommene Menge','Kommentar']
  ];
  const headRows = aoa.length;
  rows.forEach(w=>{
    aoa.push([
      w.grund||w.typ||'', w.warenbezeichnung||'',
      w.menge!==''&&w.menge!=null?num(w.menge):'',
      w.einzelpreis!==''&&w.einzelpreis!=null?num(w.einzelpreis):'',
      w.mwst!==''&&w.mwst!=null?num(w.mwst):'',
      parseDateLoose(w.mhd) || (w.mhd||''),
      w.ek_brutto!==''&&w.ek_brutto!=null?num(w.ek_brutto):'',
      w.ek_netto!==''&&w.ek_netto!=null?num(w.ek_netto):'',
      w.private_entnahme||'', w.kommentar||''
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(aoa, {cellDates:true});
  // Spaltenbreiten (an Vorlage angelehnt).
  ws['!cols']=[{wch:20},{wch:42},{wch:8},{wch:13},{wch:10},{wch:13},{wch:21},{wch:20},{wch:24},{wch:30}];
  const EUR='#,##0.00\\ "€"';
  const PCT='0\\ "%"';                     // 19 -> "19 %" (Wert bleibt Zahl, kein Excel-Ratespiel)
  // Zentriert: Grund (0) + alle Zahl-/Datumsspalten. Linksbündig: Warenbezeichnung (1) & Kommentar (9).
  const CENTERCOLS=new Set([0,2,3,4,5,6,7,8]);
  const lastCol=9, lastRow=aoa.length-1;
  for(let r=headRows; r<=lastRow; r++){
    for(let c=0;c<=lastCol;c++){
      const ref=XLSX.utils.encode_cell({r,c}); const cell=ws[ref]; if(!cell) continue;
      if(c===3||c===6||c===7) cell.z=EUR;                 // Währungsspalten
      else if(c===4) cell.z=PCT;                          // MwSt als Prozent
      else if(c===5 && cell.t==='d') cell.z='dd.mm.yyyy'; // MHD als Datum
      cell.s = { alignment:{ horizontal: CENTERCOLS.has(c)?'center':'left', vertical:'center' } };
    }
  }
  // Kopfzeile der Tabelle: fett, zentriert, umbrechbar.
  for(let c=0;c<=lastCol;c++){
    const ref=XLSX.utils.encode_cell({r:headRows-1,c}); const cell=ws[ref]; if(!cell) continue;
    cell.s = { font:{bold:true}, alignment:{horizontal:'center', vertical:'center', wrapText:true} };
  }
  // Echte Excel-Tabelle mit AutoFilter + fixierte Kopfzeile.
  ws['!autofilter']={ ref:`${XLSX.utils.encode_cell({r:headRows-1,c:0})}:${XLSX.utils.encode_cell({r:lastRow,c:lastCol})}` };
  ws['!freeze']={ xSplit:0, ySplit:headRows };

  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Warenverderb '+jahrLabel);
  const fname = filterYear==null ? 'warenverderb_gesamt.xlsx' : 'warenverderb_'+filterYear+'.xlsx';
  XLSX.writeFile(wb, fname, {cellDates:true});
  // Punkt 4: zuletzt exportierte Version pro Jahr in der Cloud sichern.
  saveExportSnapshot(filterYear, rows);
  toast('Excel exportiert ('+jahrLabel+')');
}

/* Repariert kaputte Umlaute (UTF-8 als Latin-1 gelesen: Ã¤->ä). Nicht-rettbare � bleiben. */
function fixMojibake(s){
  if(!s || !/[ÃÂ]/.test(s)) return s;
  try{ const bytes=Uint8Array.from([...s].map(c=>c.charCodeAt(0)&0xff)); return new TextDecoder('utf-8').decode(bytes); }
  catch(e){ return s; }
}
function mapImportItem(it){
  const ekn=num(it.ek_netto), ekb=num(it.ek_brutto), roh=num(it.rohpreis);
  const mwst = ekn>0 ? Math.round((ekb/ekn-1)*100) : settings.default_mwst;
  const nb = Math.abs(roh-ekb) <= Math.abs(roh-ekn) ? 'brutto':'netto';
  return {
    name: fixMojibake(it.name||''), kategorie: fixMojibake(it.kategorie||''), ean: it.ean||'',
    rohpreis: roh||ekb||ekn, netto_brutto: nb, mwst_ek: (mwst===7||mwst===19)?mwst:settings.default_mwst,
    marge_soll: settings.default_marge,
    preisschild: it.preisschild!=null?num(it.preisschild):'',
    aktionspreis:'', pfand_betrag:0, pfand_mwst:19,
    bestand: it.bestand!=null?num(it.bestand):999999,
    mhd:'', beliebtheit:'keine Angabe',
    im_automat: String(it.im_automat).toLowerCase()==='ja' || it.im_automat===true
  };
}
function doImport(items){
  if(!items || !items.length){ alert('Keine Produkte in den Daten gefunden.'); return; }
  if(products.length>0 && !confirm('Es sind bereits '+products.length+' Produkte da.\n\nMit den '+items.length+' importierten ERSETZEN?\n(OK = ersetzen, Abbrechen = nichts ändern)')) return;
  products = items.map(it=>({id:uid(), ...mapImportItem(it)}));

  else toast(items.length+' Produkte importiert');
  go('produkte');
}

/* ===================== VENDON-ABGLEICH =====================
   Vendon-Export liefert: Name, Preis (VK brutto), MwSt %, Kategorie.
   KEIN EK, KEINE EAN -> wir gleichen nur ab, überschreiben NICHTS automatisch. */
function importVendon(input){
  const file=input.files[0]; if(!file)return;
  if(typeof XLSX==='undefined'){ alert('Excel-Bibliothek nicht geladen. Bitte Seite neu laden.'); return; }
  const fr=new FileReader();
  fr.onload=()=>{
    try{
      const wb=XLSX.read(fr.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false});
      // Kopfzeile finden (enthält "Name" und "Preis")
      let h=-1;
      for(let i=0;i<rows.length;i++){ const r=(rows[i]||[]).map(x=>String(x||'').toLowerCase()); if(r.includes('name')&&r.some(c=>c.includes('preis'))){ h=i; break; } }
      if(h<0){ alert('Konnte die Tabellenüberschrift (Name/Preis) nicht finden. Ist das ein Vendon-Produktexport?'); return; }
      const head=(rows[h]||[]).map(x=>String(x||'').toLowerCase().trim());
      const col=n=>head.findIndex(c=>c.includes(n));
      const ci={name:col('name'), preis:head.findIndex(c=>c==='preis'||c==='preis '), mwst:col('mwst'), kat:col('kategor'), ek:col('einkauf')};
      if(ci.preis<0) ci.preis=col('preis');
      const items=[];
      for(let i=h+1;i<rows.length;i++){
        const r=rows[i]||[]; const name=String(r[ci.name]||'').trim(); if(!name) continue;
        items.push({ name,
          vk: num(String(r[ci.preis]).replace(',','.')),
          mwst: parseInt(String(r[ci.mwst]||'').replace('%',''))||null,
          kat: ci.kat>=0?String(r[ci.kat]||'').trim():'' });
      }
      if(!items.length){ alert('Keine Produktzeilen gefunden.'); return; }
      showVendonReconcile(items);
    }catch(e){ alert('Fehler beim Lesen der Vendon-Datei:\n'+e); }
  };
  fr.readAsArrayBuffer(file);
}
let _vendonItems=[];
let _vendonConfirmed={};   // index -> productId, vom Nutzer bestätigte Zuordnungen
function showVendonReconcile(items){
  _vendonItems=items;
  const AUTO=0.82, SUGGEST=0.68;   // Schwellen aus Tests
  const matched=[], pricediff=[], vorschlag=[], neu=[];
  const usedProductIds=new Set();
  items.forEach((v,idx)=>{
    // Vom Nutzer bestätigte Zuordnung hat Vorrang.
    let p = _vendonConfirmed[idx]!=null ? products.find(x=>x.id===_vendonConfirmed[idx]) : null;
    let score = p ? 1 : 0;
    if(!p){
      const exact=findProductByName(v.name);
      if(exact){ p=exact; score=1; }
      else { const m=bestProductMatch(v.name); if(m){ p=m.score>=SUGGEST?m.p:null; score=m.score; } }
    }
    if(!p){ neu.push({v,idx,score}); return; }
    if(score<AUTO){ vorschlag.push({v,idx,p,score}); return; }   // unsicher -> bestätigen lassen
    usedProductIds.add(p.id);
    const c=rechnePreis(p);
    if(v.vk>0 && Math.abs(v.vk - r2(c.verkauf))>0.005) pricediff.push({v,p,toolPreis:r2(c.verkauf)});
    else matched.push({v,p});
  });
  const nichtImAutomat=products.filter(p=>!usedProductIds.has(p.id));

  $('modal').innerHTML = `
    <div class="modal-head"><h2>Vendon-Abgleich</h2>
      <button class="x" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div class="vend-stats">
        <div class="vend-stat"><b>${matched.length+pricediff.length}</b><span>erkannt</span></div>
        <div class="vend-stat ${vorschlag.length?'blue':''}"><b>${vorschlag.length}</b><span>zu prüfen</span></div>
        <div class="vend-stat ${pricediff.length?'warn':''}"><b>${pricediff.length}</b><span>Preis weicht ab</span></div>
        <div class="vend-stat ${neu.length?'blue':''}"><b>${neu.length}</b><span>neu</span></div>
      </div>
      ${vorschlag.length?`<h3 style="font-size:14px;margin:16px 0 8px">Mögliche Treffer — bitte prüfen</h3>
        <p class="d" style="margin-bottom:8px">Ähnliche Namen gefunden. Bestätige die Zuordnung oder lege neu an.</p>
        <div class="vend-list">${vorschlag.slice(0,200).map(x=>`<div class="vend-row">
          <div class="vend-name">${esc(x.v.name)}<span class="vend-sub">≈ ${esc(x.p.name)} <span class="vend-score">${Math.round(x.score*100)} %</span></span></div>
          <div class="vend-acts2">
            <button class="btn btn-acc btn-sm" onclick="confirmVendonMatch(${x.idx},'${x.p.id}')">ist dasselbe</button>
            <button class="btn btn-ghost btn-sm" onclick="createFromVendon(${x.idx})">neu</button>
          </div>
        </div>`).join('')}</div>`:''}
      ${pricediff.length?`<h3 style="font-size:14px;margin:16px 0 8px">Preisabweichungen</h3>
        <div class="vend-list">${pricediff.slice(0,200).map(x=>`<div class="vend-row">
          <div class="vend-name">${esc(x.v.name)}</div>
          <div class="vend-cmp">Tool ${eur(x.toolPreis)} € → Vendon <b>${eur(x.v.vk)} €</b></div>
          <button class="btn btn-ghost btn-sm" onclick="adoptVendonPrice('${x.p.id}',${x.v.vk})">übernehmen</button>
        </div>`).join('')}</div>`:''}
      ${neu.length?`<h3 style="font-size:14px;margin:16px 0 8px">Neu in Vendon (noch nicht im Tool)</h3>
        <p class="d" style="margin-bottom:8px">Anlegen legt das Produkt mit Vendon-Verkaufspreis als Preisschild an. EK/Marge/MHD danach ergänzen.</p>
        <div class="vend-list">${neu.slice(0,200).map(x=>`<div class="vend-row">
          <div class="vend-name">${esc(x.v.name)}<span class="vend-sub">${esc(x.v.kat||'')} · ${x.v.mwst||'?'} %</span></div>
          <div class="vend-cmp">VK ${eur(x.v.vk)} €</div>
          <button class="btn btn-ghost btn-sm" onclick="createFromVendon(${x.idx})">anlegen</button>
        </div>`).join('')}</div>`:''}
      ${nichtImAutomat.length?`<h3 style="font-size:14px;margin:16px 0 8px">Im Tool, aber nicht im Automaten <span style="color:var(--txt3);font-weight:400">(${nichtImAutomat.length})</span></h3>
        <div class="vend-list" style="max-height:140px">${nichtImAutomat.slice(0,200).map(p=>`<div class="vend-row"><div class="vend-name">${esc(p.name)}</div></div>`).join('')}</div>`:''}
      ${(!pricediff.length&&!neu.length&&!vorschlag.length)?`<p class="d" style="margin-top:14px">✓ Alles im Einklang — keine Abweichungen.</p>`:''}
      <div style="margin-top:18px"><button class="btn btn-acc" style="width:100%;justify-content:center" onclick="closeVendon()">Fertig</button></div>
    </div>`;
  showModal();
}
function confirmVendonMatch(idx, pid){ _vendonConfirmed[idx]=pid; showVendonReconcile(_vendonItems); }
function closeVendon(){ _vendonConfirmed={}; closeModal(); }
function adoptVendonPrice(pid, vk){

async function importFromUrl(){

  if(!url){ toast('Bitte URL eintragen'); return; }
  const btn=$('urlBtn'); const old=btn.innerHTML; btn.innerHTML='Lädt…'; btn.disabled=true;

    doImport(Array.isArray(j)?j:(j.items||[]));
  }catch(e){
    alert('Konnte nicht laden:\n'+e+'\n\nTipp: Öffne die URL einmal im Browser. Erscheint dort Text/JSON, stimmt sie. Bei „404" ist das Datum im Dateinamen anders.');

/* Liest den aktuell verlinkten JSON-Pfad direkt aus der app.js der Webseite. */
async function importAuto(){
  const btn=$('autoBtn'); const old=btn.innerHTML; btn.innerHTML='Lädt…'; btn.disabled=true;
  try{
    const ajs=await fetch('app.js',{cache:'no-store'});
    if(!ajs.ok) throw new Error('app.js nicht gefunden (HTTP '+ajs.status+'). Liegt thein.html im selben Ordner wie app.js?');
    const code=await ajs.text();
    const m=code.match(/JSON_FILE\s*=\s*["'`]([^"'`]+)["'`]/);
    if(!m) throw new Error('In app.js kein JSON_FILE-Pfad gefunden.');
    const jsonUrl=new URL(m[1], location.href).href;
    if($('urlInput')) $('urlInput').value=jsonUrl;
    const res=await fetch(jsonUrl,{cache:'no-store'});
    if(!res.ok) throw new Error('JSON nicht ladbar (HTTP '+res.status+'):\n'+jsonUrl);
    const j=await res.json();
    doImport(Array.isArray(j)?j:(j.items||[]));
  }catch(e){
    alert('Automatik fehlgeschlagen:\n'+e+'\n\nFallback: trag die URL unten manuell ein oder importiere eine Datei.');
  }
  btn.innerHTML=old; btn.disabled=false;
}

/* Zählt, wie oft jede Kategorie in den Produkten vorkommt. */
function categoryUsage(){
  const u={}; products.forEach(p=>{ const k=(p.kategorie||'').trim(); if(k) u[k]=(u[k]||0)+1; });
  (settings.extra_kats||[]).forEach(k=>{ if(k && u[k]==null) u[k]=0; });   // angelegte, noch ungenutzte
  return u;
}
/* Alle Kategorien (aus Produkten + angelegte), alphabetisch — für Auswahllisten. */
function allCategories(){
  const s=new Set(products.map(p=>(p.kategorie||'').trim()).filter(Boolean));
  (settings.extra_kats||[]).forEach(k=>{ if(k) s.add(k); });
  return [...s].sort((a,b)=>a.localeCompare(b,'de'));
}

async function confirmRenameCategory(){
  const oldKat=_catTarget;
  const neu=$('renameKat')?$('renameKat').value.trim():''; if(!neu){ toast('Bitte einen Namen eingeben'); return; }
  if(neu===oldKat){ closeModal(); return; }
  const changed=[];
  products.forEach(p=>{ if((p.kategorie||'').trim()===oldKat){ p.kategorie=neu; p._updated=new Date().toISOString(); changed.push(p); } });
  const wasExtra = (settings.extra_kats||[]).includes(oldKat);
  if(settings.extra_kats){ settings.extra_kats=settings.extra_kats.map(k=>k===oldKat?neu:k).filter((k,i,a)=>a.indexOf(k)===i); }
  persist(); closeModal(); render();
  const finishCloud = async()=>{ if(USE_CLOUD){ try{ for(const p of changed) await cloudUpsert('products', p); await saveSettingsObjAsync(); render(); }catch(e){} } else saveSettingsObj(); };
  await finishCloud();
  toastUndo('Umbenannt in „'+neu+'"', async()=>{
    changed.forEach(p=>{ p.kategorie=oldKat; p._updated=new Date().toISOString(); });
    if(settings.extra_kats){ settings.extra_kats=settings.extra_kats.map(k=>k===neu?oldKat:k).filter((k,i,a)=>a.indexOf(k)===i); }
    persist(); render(); await finishCloud(); toast('Wiederhergestellt');
  });
}
/* Kategorie aus allen Produkten entfernen (Feld leeren) + aus extra_kats. Mit Bestätigung. */
function removeCategory(kat){
  _catTarget = kat;
  const used=categoryUsage(); const n=used[kat]||0;
  $('modal').innerHTML = `
    <div class="modal-head"><h2>Kategorie entfernen?</h2>
      <button class="x" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <p class="d" style="margin-top:0">Die Kategorie <b>${esc(kat)}</b> wird ${n?`bei <b>${n}</b> Produkt${n===1?'':'en'} entfernt und `:''}aus der Liste gelöscht. Die Produkte selbst bleiben erhalten — nur die Kategorie-Zuordnung wird geleert.</p>
      <div class="modal-btnrow">
        <button class="btn btn-ghost" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-danger" onclick="confirmRemoveCategory()">Entfernen</button>
      </div>
    </div>`;
  showModal();
}
async function confirmRemoveCategory(){
  const kat=_catTarget;
  const changed=[];
  products.forEach(p=>{ if((p.kategorie||'').trim()===kat){ p.kategorie=''; p._updated=new Date().toISOString(); changed.push(p); } });
  const wasExtra = (settings.extra_kats||[]).includes(kat);
  if(settings.extra_kats){ settings.extra_kats=settings.extra_kats.filter(k=>k!==kat); }
  persist(); closeModal(); render();
  const finishCloud = async()=>{ if(USE_CLOUD){ try{ for(const p of changed) await cloudUpsert('products', p); await saveSettingsObjAsync(); render(); }catch(e){} } else saveSettingsObj(); };
  await finishCloud();
  toastUndo('Kategorie „'+kat+'" entfernt', async()=>{
    changed.forEach(p=>{ p.kategorie=kat; p._updated=new Date().toISOString(); });
    if(wasExtra && !(settings.extra_kats||[]).includes(kat)){ settings.extra_kats=[...(settings.extra_kats||[]), kat]; }
    persist(); render(); await finishCloud(); toast('Wiederhergestellt');
  });
}

async function openBackups(){
  $('modal').innerHTML = `
    <div class="modal-head"><h2>Backups</h2>
      <button class="x" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body"><p class="d" id="bkLoading" style="margin-top:0">Lade Backups…</p><div id="bkList"></div></div>`;
  showModal();
  const list=await listBackups();
  const ld=$('bkLoading'); if(ld) ld.style.display='none';
  const el=$('bkList'); if(!el) return;
  if(!list.length){ el.innerHTML='<p class="d">Noch keine automatischen Backups vorhanden. Das erste entsteht beim nächsten Tagesstart.</p>'; return; }
  el.innerHTML = `<div class="vend-list">${list.map(b=>{
    const d=new Date(b.created_at); const lbl=isNaN(d)?b.id:d.toLocaleString('de-DE');
    return `<div class="vend-row">
      <div class="vend-name">${esc(lbl)}</div>
      <button class="btn btn-ghost btn-sm" onclick="confirmRestore('${b.id}','${esc(lbl)}')">wiederherstellen</button>
    </div>`;
  }).join('')}</div>`;
}
function confirmRestore(id, lbl){

    <div class="modal-head"><h2>Backup wiederherstellen?</h2>
      <button class="x" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <p class="d" style="margin-top:0">Der Stand vom <b>${esc(lbl)}</b> wird geladen und ersetzt die aktuellen Daten — auf allen Geräten.</p>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-ghost" style="flex:1;justify-content:center" onclick="openBackups()">Abbrechen</button>
        <button class="btn btn-danger" style="flex:1;justify-content:center" onclick="restoreBackup('${id}')">Wiederherstellen</button>
      </div>

}
/* Speichert das settings-Objekt (lokal + Cloud), ohne das Formular zu lesen.
   Für Aktionen wie Kategorie anlegen/umbenennen, die settings direkt ändern. */
function saveSettingsObj(){
  localSet('thein_settings', settings);
  if(USE_CLOUD){ const biz={...settings}; delete biz.theme; sb.from('settings').upsert({id:1, data:biz}).catch(()=>{}); }
}
/* Awaitable Variante — damit nachfolgendes render() erst nach dem Cloud-Write läuft. */
async function saveSettingsObjAsync(){
  localSet('thein_settings', settings);
  if(USE_CLOUD){ const biz={...settings}; delete biz.theme; try{ await sb.from('settings').upsert({id:1, data:biz}); }catch(e){} }
}
function saveSettings(){
  settings.default_marge=num($('s_marge').value);
  settings.default_mwst=num($('s_mwst').value);
  settings.rundung=num($('s_rund').value);
  if($('s_warn')) settings.mhd_warn_tage=num($('s_warn').value)||7;
  settings.inhaber_name=$('s_name').value.trim();
  settings.inhaber_email=$('s_mail').value.trim();
  setLocalTheme(settings.theme); localSet('thein_settings', settings);
  if(USE_CLOUD){ const biz={...settings}; delete biz.theme;
    sb.from('settings').upsert({id:1, data:biz}).then(({error})=>toast(error?'Lokal gespeichert (Cloud-Fehler)':'Gespeichert')); }
  else toast('Gespeichert');
  render();
}
function wipe(){ if(!confirm('Wirklich ALLE Produkte, Verderb-Daten und Einstellungen löschen?'+(USE_CLOUD?'\n\nACHTUNG: löscht auch die Cloud-Daten auf allen Geräten!':'')))return;
  localStorage.removeItem('thein_products'); localStorage.removeItem('thein_waste'); localStorage.removeItem('thein_settings'); localStorage.removeItem('thein_eannames');
  products=[]; waste=[]; settings={...DEFAULTS, theme:localTheme()};
  if(USE_CLOUD){ (async()=>{ try{
      await cloudReplaceAll('products', []); await cloudReplaceAll('waste', []);
      await sb.from('ean_names').delete().neq('ean','__never__');
    }catch(e){} })(); }
  applyTheme(); render(); toast('Alles gelöscht'); }

/* =====================================================================
   THEME / MODAL / INIT
   ===================================================================== */
function applyTheme(){ document.body.dataset.theme=settings.theme; const b=$('themeBtnM'); if(b)b.textContent=settings.theme==='dark'?'🌙':'☀️'; }
function toggleTheme(){ settings.theme=settings.theme==='dark'?'light':'dark'; setLocalTheme(settings.theme); localSet('thein_settings',settings); applyTheme(); }
function showModal(){ $('overlay').classList.add('show'); document.body.style.overflow='hidden'; }
function closeModal(){ $('overlay').classList.remove('show'); document.body.style.overflow=''; }
$('overlay').addEventListener('click',e=>{ if(e.target===$('overlay')){ stopCam(); closeModal(); } });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ stopCam(); closeModal(); } });
document.addEventListener('click',e=>{ if($('katPanel') && !e.target.closest('.katcombo') && !e.target.closest('.katpanel')) closeKatPanel(); }, true);

/* =====================================================================
   LIVE-SYNC  (Supabase Realtime, mit Selbstheilung)
   ===================================================================== */
function scheduleReload(){
  clearTimeout(reloadTimer);
  reloadTimer=setTimeout(async()=>{
    // Nicht neu rendern, während der Nutzer in einem offenen Modal arbeitet -> Eingaben schützen.
    if($('overlay') && $('overlay').classList.contains('show')){ reloadTimer=setTimeout(scheduleReload,1500); return; }
    try{ products=await loadProducts(); waste=await loadWaste(); settings=await loadSettings(); applyTheme(); render(); }catch(e){}
  }, 250);
}
function subscribeRealtime(){
  if(!USE_CLOUD) return;
  if(rtChannel){ try{ sb.removeChannel(rtChannel); }catch(e){} rtChannel=null; }
  rtChannel = sb.channel('thein-live')
    .on('postgres_changes', {event:'*', schema:'public', table:'products'}, scheduleReload)
    .on('postgres_changes', {event:'*', schema:'public', table:'waste'},    scheduleReload)
    .on('postgres_changes', {event:'*', schema:'public', table:'settings'}, scheduleReload)
    .subscribe(status=>{
      if(status==='SUBSCRIBED') setSync('live');
      else if(status==='CHANNEL_ERROR'||status==='TIMED_OUT'||status==='CLOSED'){
        setSync('reconnecting'); setTimeout(subscribeRealtime, 3000); // Selbstheilung
      }
    });
}
/* App wieder im Vordergrund / Netz zurück -> frisch laden & Realtime erneuern.
   So sieht man Änderungen ohne App-Neustart, auch wenn die Verbindung pausiert war. */
let _lastResume=0, _pollTimer=null;
function resumeSync(){
  if(!USE_CLOUD) return;
  const now=Date.now(); if(now-_lastResume<800) return; _lastResume=now;   // Doppelauslösung dämpfen
  scheduleReload();
  subscribeRealtime();
}
document.addEventListener('visibilitychange', ()=>{ if(!document.hidden) resumeSync(); });
window.addEventListener('online', resumeSync);
window.addEventListener('focus', resumeSync);
/* Sicherheitsnetz: solange die App sichtbar & online ist, alle 20 s leise abgleichen.
   Fängt seltene verpasste Realtime-Events ab -> alles bleibt garantiert aktuell.
   (Greift nicht, wenn ein Modal offen ist — scheduleReload schützt die Eingabe.) */
function startPolling(){
  if(_pollTimer) clearInterval(_pollTimer);
  _pollTimer=setInterval(()=>{
    if(USE_CLOUD && !document.hidden && navigator.onLine) scheduleReload();
  }, 20000);
}

/* =====================================================================
   AUTH  (Login — nur im Cloud-Modus)
   ===================================================================== */
let currentUserEmail = '';
function showLogin(){ const o=$('loginOverlay'); if(o) o.style.display='flex'; }
function hideLogin(){ const o=$('loginOverlay'); if(o) o.style.display='none'; const p=$('login_pass'); if(p) p.value=''; }
async function doLogin(){
  const email=($('login_email').value||'').trim();
  const pass =$('login_pass').value||'';
  const err=$('login_err'); err.textContent='';
  if(!email || !pass){ err.textContent='Bitte E-Mail und Passwort eingeben.'; return; }
  const btn=$('login_btn'); const old=btn.textContent; btn.disabled=true; btn.textContent='Anmelden…';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled=false; btn.textContent=old;
  if(error){ err.textContent = /invalid login/i.test(error.message||'') ? 'E-Mail oder Passwort falsch.' : ('Anmeldung fehlgeschlagen: '+error.message); }
  // Erfolg -> onAuthStateChange übernimmt (hideLogin + startCloud)
}
async function doLogout(){ if(USE_CLOUD){ try{ await sb.auth.signOut(); }catch(e){} } }

/* =====================================================================
   LADEN / LIVE-SYNC starten & stoppen
   ===================================================================== */
async function startCloud(){
  setSync('connecting');
  try{
    products = await loadProducts();
    waste    = await loadWaste();
    settings = await loadSettings();
    applyTheme(); render(); setSync('live');
    subscribeRealtime();
    startPolling();      // 20s-Sicherheitsnetz für garantierte Aktualität
    autoBackupIfDue();   // täglicher Snapshot (unsichtbar, max. 1x/Tag)
  }catch(e){ setSync('offline'); toast('Cloud nicht erreichbar — lokaler Stand'); }
}
function teardownCloud(){
  if(rtChannel){ try{ sb.removeChannel(rtChannel); }catch(e){} rtChannel=null; }
  products=[]; waste=[]; render(); setSync('connecting');   // Daten beim Abmelden aus dem Speicher räumen
}

async function init(){
  // 1) Sofort aus lokalem Cache rendern (schneller Start, funktioniert offline).
  products = localGet('thein_products');
  waste    = localGet('thein_waste');
  settings = {...DEFAULTS, ...localSettingsObj(), theme:localTheme()};
  applyTheme(); render();
  // 2) Cloud-Modus: Login erzwingen, danach live laden.
  if(USE_CLOUD){
    setSync('connecting');
    sb.auth.onAuthStateChange((event, sess)=>{
      if(!sess || event==='SIGNED_OUT'){ currentUserEmail=''; teardownCloud(); showLogin(); return; }
      if(event==='SIGNED_IN' || event==='INITIAL_SESSION'){
        currentUserEmail = (sess.user && sess.user.email) || '';
        hideLogin(); startCloud();
      }
      // TOKEN_REFRESHED u.a.: läuft einfach weiter
    });
  }
}
init();

/* PWA: Service-Worker registrieren (nur über http/https, nicht bei file://). */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
